<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operations · DI Platform</title>
<meta name="description" content="Live run-the-bank operations — KPIs, MTTR, SLO burn, batch SLAs, FinOps signals."/>
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/toasts.js" defer></script>
<script src="assets/audit.js" defer></script>
<script src="assets/cmdk.js" defer></script>
<script src="assets/top-bar.js" defer></script>
<script src="assets/pricing.js" defer></script>
<script src="assets/nishi-dock.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas-2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;overflow-x:hidden;min-height:100vh}
button{font-family:var(--f-ui);cursor:pointer;border:none}
a{color:var(--gold);text-decoration:none}

/* Hero */
.op-hero{padding:24px;background:linear-gradient(180deg,#fff,var(--canvas));border-bottom:1px solid var(--border)}
.op-hero-wrap{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px}
.op-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.op-h1{font-family:var(--f-head);font-size:24px;font-weight:600;line-height:1.18}
.op-h1 em{font-style:italic;color:var(--gold)}
.op-pulse{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid var(--green);border-radius:99px;padding:5px 12px;font-size:11.5px;color:#0A8462;font-weight:700}
.op-pulse::before{content:'';width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse-dot 1.5s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:.4}50%{opacity:1}}

/* Period selector */
.op-period{background:#fff;border-bottom:1px solid var(--border);padding:11px 24px}
.op-period-wrap{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.op-period .picker{display:flex;gap:4px;background:var(--canvas);padding:3px;border-radius:9px;border:1px solid var(--border)}
.op-period .picker button{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;background:transparent;color:var(--ink-2);font-family:inherit}
.op-period .picker button.act{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
.op-period .meta{font-size:11.5px;color:var(--ink-2)}

/* Main */
.op-main{max-width:1400px;margin:0 auto;padding:22px 24px 36px}

/* KPI tiles */
.op-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media (max-width:1100px){.op-tiles{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.op-tiles{grid-template-columns:1fr}}
.op-tile{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.2s}
.op-tile:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.op-tile .head{display:flex;justify-content:space-between;align-items:flex-start}
.op-tile .lbl{font-size:10px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase}
.op-tile .ic{font-size:18px}
.op-tile .val{font-family:var(--f-head);font-size:26px;font-weight:600;line-height:1}
.op-tile .target{font-size:10.5px;color:var(--ink-2)}
.op-tile .delta{font-size:11px;font-weight:700}
.op-tile .delta.ok  {color:var(--green)}
.op-tile .delta.warn{color:var(--orange)}
.op-tile .delta.err {color:var(--red)}
.op-tile .spark{margin-top:4px}
.op-tile.ok{border-left:3px solid var(--green)}
.op-tile.warn{border-left:3px solid var(--orange)}
.op-tile.err{border-left:3px solid var(--red)}

/* Sparkline svg */
.op-spark{width:100%;height:36px;display:block}
.op-spark path{fill:none;stroke-width:1.8}
.op-spark .ok-stroke  {stroke:var(--green)}
.op-spark .warn-stroke{stroke:var(--orange)}
.op-spark .err-stroke {stroke:var(--red)}
.op-spark .ok-fill    {fill:rgba(15,212,154,.12);stroke:none}
.op-spark .warn-fill  {fill:rgba(255,128,48,.12);stroke:none}
.op-spark .err-fill   {fill:rgba(255,77,106,.12);stroke:none}

/* Section h */
.op-section-h{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;color:var(--ink);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.op-section-h .div{flex:1;height:1px;background:var(--border)}
.op-section-h .right{font-size:10px;color:var(--gold);font-weight:700;cursor:pointer;text-transform:none;letter-spacing:0}

/* Two-column area */
.op-grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:18px}
@media (max-width:1000px){.op-grid-2{grid-template-columns:1fr}}

/* Incidents list */
.op-incidents{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 18px}
.op-incident{display:grid;grid-template-columns:80px 1fr auto;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border);font-size:12px;align-items:center}
.op-incident:last-child{border-bottom:none}
.op-incident .sev{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:5px;text-align:center;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.op-incident .sev.P1{background:var(--red)}
.op-incident .sev.P2{background:var(--orange)}
.op-incident .sev.P3{background:var(--blue)}
.op-incident .desc{font-weight:600}
.op-incident .meta{font-size:10.5px;color:var(--ink-2);margin-top:2px}
.op-incident .when{font-size:10.5px;color:var(--ink-2);font-family:var(--f-mono);text-align:right}

/* FinOps panel */
.op-finops{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 18px}
.op-finops .alert{background:var(--canvas);border-left:3px solid var(--red);border-radius:7px;padding:10px 12px;margin-bottom:8px;font-size:12px}
.op-finops .alert.warn{border-left-color:var(--orange)}
.op-finops .alert.ok{border-left-color:var(--green)}
.op-finops .alert .head{font-weight:700;display:flex;justify-content:space-between;gap:8px;margin-bottom:3px}
.op-finops .alert .head .amt{color:var(--red);font-family:var(--f-mono)}
.op-finops .alert.ok .head .amt{color:var(--green)}
.op-finops .alert.warn .head .amt{color:var(--orange)}
.op-finops .alert .desc{font-size:11px;color:var(--ink-2);line-height:1.45}
.op-finops .alert .act{margin-top:6px;font-size:11px;color:var(--gold);font-weight:700;cursor:pointer}

/* Nishi intents */
.op-nishi{background:linear-gradient(135deg,#1A2238,#243655);color:#fff;border-radius:14px;padding:18px 22px;margin-top:18px}
.op-nishi .head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.op-nishi .head .ic{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-3));color:var(--ink);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:16px}
.op-nishi h3{font-family:var(--f-head);font-size:15px;font-weight:600}
.op-nishi p{font-size:12.5px;color:#C8D2E2;margin-bottom:10px;line-height:1.55}
.op-nishi .chips{display:flex;gap:6px;flex-wrap:wrap}
.op-nishi .chip{background:rgba(200,146,26,.18);border:1px solid var(--gold);color:var(--gold-3);border-radius:99px;padding:5px 12px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit}
.op-nishi .chip:hover{background:var(--gold);color:var(--ink)}

/* Batch status table */
.op-batches{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.op-batches table{border-collapse:collapse;width:100%;font-size:12px}
.op-batches thead th{background:var(--canvas);font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.op-batches td{padding:10px 14px;border-bottom:1px solid var(--canvas-2);vertical-align:middle}
.op-batches .status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;color:#fff;display:inline-block;text-transform:uppercase;letter-spacing:.04em}
.op-batches .status.OK{background:var(--green)}
.op-batches .status.WARN{background:var(--orange)}
.op-batches .status.FAIL{background:var(--red)}
.op-batches td.num{text-align:right;font-family:var(--f-mono)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .35s ease both}
</style>
</head>
<body>

<div data-di-topbar></div>

<!-- Hero -->
<section class="op-hero">
  <div class="op-hero-wrap">
    <div>
      <div class="op-eyebrow">OPERATIONS · SUPER-INTELLIGENT RUN OPS</div>
      <h1 class="op-h1">Live run-the-bank metrics, <em>updated every minute.</em></h1>
    </div>
    <div class="op-pulse">Live · sample fixtures · production data via Phase 18.x</div>
  </div>
</section>

<!-- Period selector -->
<div class="op-period">
  <div class="op-period-wrap">
    <div class="picker">
      <button data-p="1d">24 hr</button>
      <button class="act" data-p="7d">Last 7 days</button>
      <button data-p="30d">30 days</button>
      <button data-p="90d">90 days</button>
    </div>
    <div class="meta" id="op-meta">7-day window · 168 samples per KPI</div>
  </div>
</div>

<main class="op-main" id="op-main"></main>

<script>
/* ═══════════════════════════════════════════════════════
   Operations dashboard · Phase 17
   Sample fixtures for KPIs, incidents, batches, FinOps.
═══════════════════════════════════════════════════════ */

/* ── Generate realistic sample data ─────────────────── */
function genSeries(n, base, jitter, trend) {
  const a = [];
  let v = base;
  for (let i = 0; i < n; i++) {
    v = base + (Math.sin(i / 6) * jitter * 0.4) + ((Math.random() - 0.5) * jitter * 0.6) + (i / n * (trend || 0));
    a.push(Math.max(0, v));
  }
  return a;
}

const KPIS = [
  {
    id:'mttr',
    icon:'⚡',
    label:'MEAN TIME TO RECOVERY',
    target:'< 25 min',
    series: genSeries(168, 22, 14, -3),
    fmt: v => Math.round(v) + ' min',
    threshold: 30,    // above = bad
    statusFn: (last, threshold) => last < 20 ? 'ok' : (last < threshold ? 'warn' : 'err'),
    deltaFn: (avg, base) => Math.round(((avg - base) / base) * 100) + '%',
    base: 30
  },
  {
    id:'slo',
    icon:'📊',
    label:'SLO BURN RATE (PAYMENTS)',
    target:'< 5% / month',
    series: genSeries(168, 1.8, 1.0, 0.2),
    fmt: v => v.toFixed(1) + '%',
    threshold: 5,
    statusFn: (last, threshold) => last < 3 ? 'ok' : (last < threshold ? 'warn' : 'err'),
    deltaFn: (avg, base) => '+ ' + ((avg/base - 1) * 100).toFixed(0) + '%',
    base: 1.5
  },
  {
    id:'batch',
    icon:'🌙',
    label:'BATCH SLA (END-OF-DAY)',
    target:'> 99.5%',
    series: genSeries(168, 99.85, 0.4, 0),
    fmt: v => v.toFixed(2) + '%',
    threshold: 99.5,    // below = bad
    statusFn: (last, threshold) => last > 99.8 ? 'ok' : (last > threshold ? 'warn' : 'err'),
    deltaFn: (avg) => '0.0%',
    base: 99.85
  },
  {
    id:'success',
    icon:'✅',
    label:'TRANSACTION SUCCESS',
    target:'> 99.95%',
    series: genSeries(168, 99.97, 0.06, 0),
    fmt: v => v.toFixed(3) + '%',
    threshold: 99.95,
    statusFn: (last, threshold) => last > 99.97 ? 'ok' : (last > threshold ? 'warn' : 'err'),
    deltaFn: () => '+0.01%',
    base: 99.97
  }
];

const INCIDENTS = [
  { sev:'P2', desc:'Cards · Authorization API · elevated latency (p99 jumped 320ms → 940ms)',  module:'Cards · Auth',     when:'42 min ago', status:'mitigating' },
  { sev:'P3', desc:'AML batch · false-positive spike from new rule deployment',                 module:'AML',              when:'2 hr ago',   status:'investigating' },
  { sev:'P3', desc:'Treasury · ETL job slow due to Postgres autovacuum',                       module:'Treasury',         when:'4 hr ago',   status:'resolved' },
  { sev:'P1', desc:'Core Payments · settle batch failed; manual rerun successful',              module:'Core Payments',    when:'Yesterday',  status:'resolved' },
  { sev:'P3', desc:'Wealth Mgmt · SaaS vendor degraded API; failover engaged',                  module:'Wealth',           when:'2 days ago', status:'resolved' }
];

const BATCHES = [
  { name:'EOD Payments settle',           module:'Core Payments', start:'23:00', dur:'2h 14m', status:'OK',   sla:'99.95%' },
  { name:'Card transaction settlement',   module:'Cards · Tx',    start:'01:30', dur:'1h 28m', status:'OK',   sla:'99.99%' },
  { name:'AML screening (overnight)',     module:'AML',           start:'02:00', dur:'3h 41m', status:'WARN', sla:'99.20%' },
  { name:'BCBS 239 regulatory report',    module:'Risk & Comp',   start:'04:00', dur:'4h 02m', status:'OK',   sla:'100%'   },
  { name:'Cards loyalty point accrual',   module:'Cards · Loyalty',start:'05:00',dur:'58m',   status:'OK',   sla:'99.80%' }
];

function avg(arr) { return arr.reduce((a,b) => a+b, 0) / arr.length; }

/* ── Render KPI tiles ───────────────────────────────── */
function sparkSVG(series, statusClass) {
  if (!series.length) return '';
  const w = 200, h = 36;
  const max = Math.max.apply(null, series);
  const min = Math.min.apply(null, series);
  const range = max - min || 1;
  const pts = series.map((v, i) => {
    const x = (i / (series.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return [x, y];
  });
  const pathD  = 'M ' + pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L ');
  const fillD  = 'M 0,' + h + ' L ' + pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L ') + ' L ' + w + ',' + h + ' Z';
  return '<svg class="op-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<path class="' + statusClass + '-fill" d="' + fillD + '"/>' +
    '<path class="' + statusClass + '-stroke" d="' + pathD + '"/>' +
  '</svg>';
}

function renderKpiTiles() {
  let html = '<div class="op-tiles">';
  KPIS.forEach(k => {
    const last = k.series[k.series.length - 1];
    const status = k.statusFn(last, k.threshold);
    html += '<div class="op-tile ' + status + '" onclick="alertKpi(\'' + k.id + '\')">' +
      '<div class="head"><div class="lbl">' + k.label + '</div><div class="ic">' + k.icon + '</div></div>' +
      '<div class="val">' + k.fmt(last) + '</div>' +
      '<div class="target">target ' + k.target + '</div>' +
      '<div class="spark">' + sparkSVG(k.series, status) + '</div>' +
      '<div class="delta ' + status + '">' + (status === 'ok' ? '↓' : status === 'warn' ? '~' : '↑') + ' vs 7-day baseline</div>' +
    '</div>';
  });
  html += '</div>';
  return html;
}
function alertKpi(id) {
  const k = KPIS.find(x => x.id === id);
  if (!k) return;
  window.DI && window.DI.toast && window.DI.toast({ kind:'info', icon:k.icon, title:k.label, message:'Drilldown view ships in Phase 17.3. Last sample: ' + k.fmt(k.series[k.series.length-1]) + ' · target ' + k.target, duration:5000 });
}

/* ── FinOps alerts (use pricing library) ────────────── */
function renderFinOps() {
  // Pull pricing-driven alerts. Since this is sample data, surface
  // realistic banking FinOps anomalies plus one based on pricing lib.
  const alerts = [
    { kind:'warn', amt:'+$14,200/mo', title:'Cards · AWS RDS class upsized last week', desc:'r6g.large → r6g.xlarge in the Cards · Auth cluster on May 18. Currently at 41% utilisation. Consider downsizing or right-sizing.', cta:'Open right-sizing report →' },
    { kind:'err',  amt:'+$8,400/mo',  title:'Core Payments · cross-region egress spiked', desc:'us-east-1 → eu-west-1 egress climbed from 0.8 TB to 4.2 TB in 7 days. Likely a misconfigured replica.', cta:'Investigate →' },
    { kind:'ok',   amt:'-$22,800/mo', title:'3-year Savings Plan saved $22.8K this month', desc:'Architecture finalized 3-yr Savings Plan on May 15. Realised savings now flowing into AWS bill.', cta:'View plan →' }
  ];
  let html = '<div class="op-section-h">FINOPS SIGNALS · COST ANOMALIES<div class="div"></div><span class="right" onclick="askNishi(\'finops\')">Ask Nishi for full breakdown →</span></div>';
  html += '<div class="op-finops">';
  alerts.forEach(a => {
    html += '<div class="alert ' + a.kind + '"><div class="head"><span>' + a.title + '</span><span class="amt">' + a.amt + '</span></div><div class="desc">' + a.desc + '</div><div class="act" onclick="window.DI&&window.DI.toast({kind:\'info\',title:\'Coming\',message:\'Detail view ships in Phase 17.3.\'})">' + a.cta + '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ── Recent incidents ───────────────────────────────── */
function renderIncidents() {
  let html = '<div class="op-section-h">RECENT INCIDENTS · LAST 48 HOURS<div class="div"></div><span class="right" onclick="askNishi(\'incidents\')">Ask Nishi for trends →</span></div>';
  html += '<div class="op-incidents">';
  INCIDENTS.forEach(i => {
    html += '<div class="op-incident">' +
      '<span class="sev ' + i.sev + '">' + i.sev + '</span>' +
      '<div><div class="desc">' + i.desc + '</div><div class="meta">' + i.module + ' · ' + i.status + '</div></div>' +
      '<div class="when">' + i.when + '</div>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

/* ── Batches ────────────────────────────────────────── */
function renderBatches() {
  let html = '<div class="op-section-h">OVERNIGHT BATCHES · LAST RUN<div class="div"></div><span class="right" onclick="askNishi(\'batches\')">Ask Nishi to forecast tonight\'s runs →</span></div>';
  html += '<div class="op-batches"><table><thead><tr><th>Batch</th><th>Module</th><th>Start</th><th>Duration</th><th>SLA</th><th>Status</th></tr></thead><tbody>';
  BATCHES.forEach(b => {
    html += '<tr><td><strong>' + b.name + '</strong></td><td>' + b.module + '</td><td>' + b.start + '</td><td class="num">' + b.dur + '</td><td class="num">' + b.sla + '</td><td><span class="status ' + b.status + '">' + b.status + '</span></td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ── Nishi intent panel ─────────────────────────────── */
function renderNishi() {
  return '<div class="op-nishi">' +
    '<div class="head"><div class="ic">🤖</div><div><h3>Ask Nishi about Operations</h3></div></div>' +
    '<p>Run-the-bank queries you can ask in natural language. Nishi can pull from the metrics on this page, the FinOps signals, and the incident log.</p>' +
    '<div class="chips">' +
      '<button class="chip" onclick="askNishi(\'last week batch failures\')">Show last week\'s batch failures</button>' +
      '<button class="chip" onclick="askNishi(\'cost anomaly\')">Why did AWS RDS spike 14%?</button>' +
      '<button class="chip" onclick="askNishi(\'forecast EOD\')">Forecast tonight\'s EOD batches</button>' +
      '<button class="chip" onclick="askNishi(\'SLO trends\')">Are SLOs trending in or out?</button>' +
      '<button class="chip" onclick="askNishi(\'incident trends\')">Top 3 modules by incident count this month</button>' +
      '<button class="chip" onclick="askNishi(\'forecast budget\')">Forecast Q3 cloud bill</button>' +
    '</div>' +
  '</div>';
}

/* ── Dispatcher → opens Nishi with pre-filled prompt ─ */
function askNishi(prompt) {
  /* Phase 19 will parse this in Nishi. For now, set a flag so Nishi can pick it up. */
  try { sessionStorage.setItem('di_nishi_prompt', prompt); } catch (e) {}
  window.DI && window.DI.toast && window.DI.toast({ kind:'info', icon:'🤖', title:'Opening Nishi…', message:'"' + prompt + '"', duration:2500 });
  setTimeout(() => { location.href = 'nishi-chatbot.html?from=operations&q=' + encodeURIComponent(prompt); }, 600);
}

/* ── Render ─────────────────────────────────────────── */
function render() {
  const main = document.getElementById('op-main');
  main.innerHTML =
    renderKpiTiles() +
    '<div class="op-grid-2"><div>' + renderIncidents() + '</div><div>' + renderFinOps() + '</div></div>' +
    renderBatches() +
    renderNishi();
}

/* ── Period picker wiring (regenerate data) ─────────── */
document.querySelectorAll('.op-period .picker button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.op-period .picker button').forEach(x => x.classList.remove('act'));
    b.classList.add('act');
    const p = b.dataset.p;
    const samples = { '1d':24, '7d':168, '30d':720, '90d':2160 }[p] || 168;
    const labelMap = { '1d':'24 hr', '7d':'7-day', '30d':'30-day', '90d':'90-day' };
    KPIS.forEach(k => { k.series = genSeries(samples, k.base, k.base * 0.4, k.id === 'mttr' ? -3 : 0); });
    document.getElementById('op-meta').textContent = labelMap[p] + ' window · ' + samples + ' samples per KPI';
    render();
  });
});

render();
</script>

</body>
</html>
