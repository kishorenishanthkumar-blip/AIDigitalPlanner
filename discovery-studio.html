<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discovery Studio · DI Platform</title>
<meta name="description" content="Discovery Studio — pick capabilities, capture inventory, get a 7R modernization map for your banking platform."/>
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/toasts.js" defer></script>
<script src="assets/top-bar.js" defer></script>
<script src="assets/nishi-dock.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas-2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;overflow-x:hidden;min-height:100vh}
a{color:var(--gold);text-decoration:none}
button{font-family:var(--f-ui);cursor:pointer;border:none}

/* Stepper */
.ds-stepper{background:#fff;border-bottom:1px solid var(--border);padding:13px 24px}
.ds-stepper-wrap{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ds-steps{display:flex;gap:6px;align-items:center;font-size:11.5px;flex-wrap:wrap}
.ds-step{display:inline-flex;align-items:center;gap:6px}
.ds-step .n{background:var(--border);color:var(--ink-2);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.ds-step.done .n{background:var(--green);color:#fff}
.ds-step.act .n{background:var(--gold);color:#fff}
.ds-step .l{color:var(--ink-2)}
.ds-step.act .l{color:var(--ink);font-weight:700}
.ds-step .arrow{color:var(--ink-3);margin:0 4px}
.ds-save-state{font-size:10.5px;color:var(--ink-2)}
.ds-save-state .dot{color:var(--green)}

/* Hero */
.ds-hero{padding:30px 24px 18px;background:linear-gradient(180deg,#fff,var(--canvas));border-bottom:1px solid var(--border)}
.ds-hero-wrap{max-width:1100px;margin:0 auto}
.ds-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.ds-h1{font-family:var(--f-head);font-size:27px;font-weight:600;line-height:1.18;letter-spacing:-.005em}
.ds-h1 em{font-style:italic;color:var(--gold)}
.ds-sub{font-size:13px;color:var(--ink-2);margin-top:10px;max-width:700px;line-height:1.55}

/* Main content */
.ds-main{padding:24px 24px 36px;max-width:1200px;margin:0 auto}

/* Mode picker cards */
.ds-modes{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.ds-mode{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:.2s;text-decoration:none;color:inherit;display:block;position:relative}
.ds-mode:hover{border-color:var(--gold-2);transform:translateY(-2px);box-shadow:var(--shadow)}
.ds-mode.recommended{border:2px solid var(--gold)}
.ds-mode .rec-tag{position:absolute;top:-10px;right:14px;background:var(--gold);color:#fff;font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.05em}
.ds-mode-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ds-mode-icon{width:40px;height:40px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--aglow),#FFE7B3);color:var(--gold)}
.ds-mode-name{font-size:15px;font-weight:700}
.ds-mode-meta{font-size:11px;color:var(--ink-2)}
.ds-mode-desc{font-size:12px;color:var(--ink-2);line-height:1.55;margin-bottom:10px}
.ds-mode-out{font-size:10.5px;color:var(--green);font-weight:700}
.ds-mode.dim{opacity:.75;border-style:dashed}
.ds-mode.dim .ds-mode-icon{background:linear-gradient(135deg,var(--green-bg),#C7F4E2);color:#0A8462}
.ds-mode.dim .ds-mode-out{color:var(--ink-2)}
.ds-mode-coming{background:var(--border);color:var(--ink-2);border-radius:99px;padding:2px 7px;font-size:9.5px;font-weight:700;margin-left:4px}

.ds-resume-card{background:var(--ink);color:#fff;border-radius:14px;padding:16px 18px;margin-top:18px;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
.ds-resume-card .lbl{font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--gold-3);text-transform:uppercase;margin-bottom:3px}
.ds-resume-card .title{font-weight:600;font-size:14px}
.ds-resume-card .meta{font-size:11.5px;color:#8AA4C8;margin-top:3px}
.ds-resume-card .actions{display:flex;gap:8px}
.ds-resume-card .actions button{font-family:inherit;cursor:pointer}
.ds-resume-card .actions .primary{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700}
.ds-resume-card .actions .ghost{background:transparent;border:1px solid #243655;color:var(--gold-3);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600}

/* Tip block */
.ds-tip{margin-top:18px;background:#FFFCF4;border:1px dashed var(--gold-2);border-radius:11px;padding:13px 17px;font-size:12px;line-height:1.55;color:#7A5F10}
.ds-tip strong{color:var(--gold)}

/* Capability picker */
.ds-cap-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 22px}
.ds-cap-group{margin-bottom:18px}
.ds-cap-group:last-child{margin-bottom:0}
.ds-cap-group-head{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--ink);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ds-cap-group-head .ct{color:var(--ink-2);font-weight:400;text-transform:none;letter-spacing:0}
.ds-cap-group-head .div{flex:1;height:1px;background:var(--border)}
.ds-cap-group-head .all{font-size:10px;color:var(--gold);font-weight:700;cursor:pointer;text-decoration:none}
.ds-cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media (max-width:720px){.ds-cap-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:480px){.ds-cap-grid{grid-template-columns:1fr}}
.ds-cap{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;font-size:12px;background:var(--canvas);color:var(--ink-2);transition:.15s}
.ds-cap input{accent-color:var(--gold);cursor:pointer}
.ds-cap:hover{border-color:var(--gold-2)}
.ds-cap.checked{background:var(--aglow);border-color:var(--gold-2);color:var(--ink)}
.ds-cap .crit{background:var(--red);color:#fff;font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:99px;margin-left:auto}

/* Wizard footer */
.ds-foot{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.ds-foot .summary{font-size:11.5px;color:var(--ink-2)}
.ds-foot .summary strong{color:var(--ink)}
.ds-foot .actions{display:flex;gap:8px}
.ds-foot button{font-family:inherit}
.ds-foot .ghost{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--ink);cursor:pointer}
.ds-foot .ghost:hover{border-color:var(--gold);color:var(--gold)}
.ds-foot .primary{background:var(--gold);border:none;border-radius:8px;padding:7px 14px;font-size:12px;color:#fff;font-weight:700;cursor:pointer}
.ds-foot .primary:hover{background:var(--gold-2)}
.ds-foot .danger{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer}

/* Per-capability detail */
.ds-detail-wrap{display:grid;grid-template-columns:240px 1fr;gap:18px}
@media (max-width:900px){.ds-detail-wrap{grid-template-columns:1fr}.ds-cap-list{order:2}}
.ds-cap-list{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;height:fit-content;position:sticky;top:74px}
.ds-cap-list .cl-h{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--ink-2);text-transform:uppercase;margin-bottom:8px}
.ds-cap-list-row{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;margin-bottom:2px;color:var(--ink-2)}
.ds-cap-list-row:hover{background:var(--canvas)}
.ds-cap-list-row.done{background:var(--green-bg)}
.ds-cap-list-row.act{background:var(--aglow);border:1px solid var(--gold-2);color:var(--ink);font-weight:700}
.ds-cap-list-row.done .badge{color:var(--green);font-weight:700;font-size:10.5px}
.ds-cap-list-row.act .badge{color:var(--gold);font-weight:700;font-size:10.5px}
.ds-progress{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:10px}
.ds-progress > div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-3));border-radius:99px;transition:width .3s}
.ds-progress-lbl{font-size:10.5px;color:var(--ink-2);margin-top:6px;text-align:center}

.ds-detail{}
.ds-detail-header{margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px}
.ds-detail-title{font-family:var(--f-head);font-size:21px;font-weight:600;line-height:1.18}
.ds-detail-meta{font-size:11.5px;color:var(--ink-2);margin-top:2px}
.ds-detail-tools{display:flex;gap:6px}
.ds-detail-tools button{background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:11px;cursor:pointer;color:var(--ink)}
.ds-detail-tools button:hover{border-color:var(--gold);color:var(--gold)}

.ds-tabs{background:#fff;border:1px solid var(--border);border-bottom:none;border-radius:14px 14px 0 0;padding:4px;display:flex;gap:3px;overflow-x:auto}
.ds-tab{flex:1;background:transparent;border:none;border-radius:9px;padding:8px 12px;font-size:11.5px;color:var(--ink-2);cursor:pointer;font-family:inherit;white-space:nowrap}
.ds-tab:hover{color:var(--ink)}
.ds-tab.act{background:var(--aglow);border:1px solid var(--gold-2);font-weight:700;color:var(--ink)}
.ds-tab-panel{background:#fff;border:1px solid var(--border);border-radius:0 0 14px 14px;padding:20px 22px}
.ds-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px}
@media (max-width:680px){.ds-grid-2{grid-template-columns:1fr}}
.ds-field{}
.ds-field label{font-size:11px;font-weight:700;color:var(--ink);display:block;margin-bottom:5px}
.ds-field label .hint{color:var(--ink-3);font-weight:400;font-size:10.5px}
.ds-field select,.ds-field input{width:100%;padding:9px 12px;background:var(--canvas);border:1px solid var(--border-2);border-radius:8px;font-size:13px;color:var(--ink);outline:none;font-family:inherit}
.ds-field select:focus,.ds-field input:focus{border-color:var(--gold);background:#FFFCF4}
.ds-conf{font-size:10.5px;color:var(--ink-2);margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.ds-conf select{width:auto;padding:3px 6px;font-size:10.5px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--ink-2)}
.ds-complexity{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:5px}
.ds-complexity input[type=radio]{display:none}
.ds-complexity label{display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:9px;padding:9px;text-align:center;font-size:11.5px;cursor:pointer;background:#fff;font-weight:500}
.ds-complexity label:hover{border-color:var(--gold)}
.ds-complexity input:checked + label{border:2px solid var(--gold);background:var(--aglow);font-weight:700;color:var(--ink)}
.ds-advanced{margin-top:14px;border-top:1px dashed var(--border);padding-top:12px}
.ds-advanced-tog{font-size:11.5px;color:var(--gold);font-weight:700;cursor:pointer;background:transparent;border:none;padding:0;font-family:inherit}
.ds-advanced-tog::before{content:'▸ ';transition:.2s;display:inline-block}
.ds-advanced.open .ds-advanced-tog::before{transform:rotate(90deg)}
.ds-advanced-body{display:none;margin-top:10px}
.ds-advanced.open .ds-advanced-body{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
@media (max-width:680px){.ds-advanced.open .ds-advanced-body{grid-template-columns:1fr}}

.ds-nishi-tip{margin-top:16px;background:#FFFCF4;border:1px dashed var(--gold-2);border-radius:10px;padding:11px 14px;font-size:11.5px;color:#7A5F10;display:flex;gap:10px;align-items:flex-start;line-height:1.55}
.ds-nishi-tip strong{color:var(--gold)}

/* 7R result */
.ds-result-hero{padding:24px;background:linear-gradient(180deg,#fff,var(--canvas));border-bottom:1px solid var(--border);border-radius:14px;margin-bottom:14px}
.ds-result-stats{display:flex;gap:10px;flex-wrap:wrap}
.ds-result-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:130px}
.ds-result-stat.ok{background:var(--green-bg);border-color:var(--green)}
.ds-result-stat.warn{background:var(--aglow);border-color:var(--gold)}
.ds-result-stat .lbl{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-2);text-transform:uppercase}
.ds-result-stat .val{font-family:var(--f-head);font-size:21px;font-weight:600}
.ds-result-stat.ok .val{color:#0A8462}
.ds-result-stat.warn .val{color:var(--gold)}
.ds-mix-bar{display:flex;height:32px;border-radius:9px;overflow:hidden;font-size:10.5px;font-weight:700;color:#fff;margin-top:8px}
.ds-mix-bar > div{display:flex;align-items:center;justify-content:center;min-width:0}
.ds-mix-legend{display:flex;gap:12px;margin-top:6px;font-size:10.5px;color:var(--ink-2);flex-wrap:wrap}
.ds-mix-legend span{display:inline-flex;align-items:center;gap:4px}
.ds-mix-legend span::before{content:'';width:9px;height:9px;border-radius:2px;background:var(--c);display:inline-block}

.ds-7r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media (max-width:760px){.ds-7r-grid{grid-template-columns:1fr}}
.ds-7r-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;border-left:4px solid var(--c)}
.ds-7r-card .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
.ds-7r-card .name{font-size:13px;font-weight:700}
.ds-7r-card .stack{font-size:11px;color:var(--ink-2);margin-top:2px}
.ds-7r-card .verdict{font-size:9.5px;font-weight:700;color:#fff;padding:3px 8px;border-radius:99px;background:var(--c);white-space:nowrap}
.ds-7r-card .stats{display:flex;gap:12px;font-size:11px;color:var(--ink-2);margin-bottom:8px;flex-wrap:wrap}
.ds-7r-card .stats strong{color:var(--ink)}
.ds-7r-card .why{font-size:11.5px;color:var(--ink);line-height:1.55}
.ds-7r-card .why strong{color:var(--gold)}

.ds-cta-strip{margin-top:18px;background:var(--ink);color:#fff;border-radius:12px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
.ds-cta-strip .lbl{font-size:10px;font-weight:700;color:var(--gold-3);letter-spacing:.1em;text-transform:uppercase}
.ds-cta-strip .h{font-size:14px;font-weight:600;margin-top:2px}
.ds-cta-strip .sub{font-size:11.5px;color:#8AA4C8;margin-top:3px}
.ds-cta-strip .actions{display:flex;gap:8px}
.ds-cta-strip .primary{background:var(--gold);border:none;color:#fff;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer}
.ds-cta-strip .ghost{background:transparent;border:1px solid #243655;color:var(--gold-3);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer}

/* Banner */
.ds-banner{background:#FFFCF4;border:1px solid var(--gold-2);border-radius:10px;padding:11px 14px;font-size:12px;color:#7A5F10;margin-bottom:14px;display:flex;align-items:center;gap:10px;line-height:1.55}
.ds-banner strong{color:var(--gold)}
.ds-banner .right{margin-left:auto;display:flex;gap:6px}
.ds-banner button{background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;cursor:pointer}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .35s ease both}
</style>
</head>
<body>

<div data-di-topbar></div>

<!-- Stepper -->
<div class="ds-stepper">
  <div class="ds-stepper-wrap">
    <div class="ds-steps" id="ds-steps"></div>
    <div class="ds-save-state" id="ds-save"><span class="dot">●</span> Auto-saved</div>
  </div>
</div>

<!-- Hero (rendered per step) -->
<section class="ds-hero" id="ds-hero"></section>

<!-- Main content (rendered per step) -->
<main class="ds-main" id="ds-app"></main>

<script>
/* ═══════════════════════════════════════════════════════
   Discovery Studio · wizard (Phase 14b.1 + 14b.2 + 14b.4)
═══════════════════════════════════════════════════════ */

/* ── Capability catalogue ─────────────────────────────── */
const CAPS = [
  // group, key, name, critical?
  { g:'core',  id:'core-payments',   name:'Core Banking · Payments',  critical:true, current:'COBOL · IBM z/OS · Batch settle',  future:'EKS + Aurora MySQL', stack:'AWS', verdict:'REARCH' },
  { g:'core',  id:'core-deposits',   name:'Core Banking · Deposits',                  current:'AS/400 · RPG · Green-screen',       future:'AKS + Postgres HA',  stack:'AZURE', verdict:'REPLAT' },
  { g:'core',  id:'core-loans',      name:'Core Banking · Loans',                     current:'UNIX AIX · Java EE',                 future:'GKE + Spanner + Kafka', stack:'GCP', verdict:'REFACT' },
  { g:'core',  id:'trade-finance',   name:'Trade Finance',                            current:'COBOL · SWIFT MT batches',           future:'ISO 20022 streaming gateway', stack:'AWS', verdict:'REFACT' },
  { g:'core',  id:'treasury',        name:'Treasury',                                 current:'Solaris · Custom C++ · Oracle 11g',  future:'Postgres HA · Kafka', stack:'OCI', verdict:'REPLAT' },
  { g:'core',  id:'wealth',          name:'Wealth Management',                        current:'Web 1.0 portal · ColdFusion',        future:'SaaS (Avaloq / Temenos)', stack:'SaaS', verdict:'REPLACE' },
  { g:'core',  id:'private',         name:'Private Banking',                          current:'On-prem · Java EE',                  future:'Hybrid · Spring Boot', stack:'AZURE', verdict:'REPLAT' },

  { g:'cards', id:'card-fulfill',    name:'Card fulfillment',                         current:'Windows · .NET Framework',           future:'.NET 8 · Container Apps', stack:'AZURE', verdict:'REHOST' },
  { g:'cards', id:'card-mgmt',       name:'Card management',                          current:'On-prem mainframe',                  future:'EKS + DynamoDB', stack:'AWS', verdict:'REFACT' },
  { g:'cards', id:'card-tx',         name:'Transaction management',                   current:'COBOL · batch',                       future:'Event-driven Kafka', stack:'AWS', verdict:'REFACT' },
  { g:'cards', id:'loyalty-debit',   name:'Loyalty & rewards (debit)',                current:'Vendor SaaS (legacy)',                future:'Vendor SaaS (modern)', stack:'SaaS', verdict:'REPLACE' },
  { g:'cards', id:'loyalty-credit',  name:'Loyalty & rewards (credit)',               current:'Vendor SaaS (legacy)',                future:'Vendor SaaS (modern)', stack:'SaaS', verdict:'REPLACE' },

  { g:'cust',  id:'acq-consumer',    name:'Acquisition · consumer',                   current:'Web portal · Java',                   future:'Headless API + KYC orchestration', stack:'AWS', verdict:'REFACT' },
  { g:'cust',  id:'acq-corporate',   name:'Acquisition · corporate',                  current:'Salesforce + custom',                  future:'Salesforce + API hub', stack:'SaaS', verdict:'REPLAT' },
  { g:'cust',  id:'account-mgmt',    name:'Account management',                       current:'On-prem Java EE',                      future:'Cloud-native microservices', stack:'AWS', verdict:'REFACT' },
  { g:'cust',  id:'service',         name:'Service & support',                        current:'On-prem CRM',                          future:'Modern CRM SaaS',  stack:'SaaS', verdict:'REPLACE' },

  { g:'risk',  id:'risk-comp',       name:'Risk & Compliance',      critical:true,    current:'Mix · Excel + SQL Server',             future:'Unified risk data platform', stack:'AWS', verdict:'REARCH' },
  { g:'risk',  id:'aml',             name:'AML / Fraud',           critical:true,     current:'Vendor v3.2 · Batch screening',         future:'Async event-driven · Real-time', stack:'AWS', verdict:'REARCH' },
  { g:'risk',  id:'audit',           name:'Audit & regulatory reporting',              current:'Manual Excel + DW',                    future:'Snowflake + dbt', stack:'AZURE', verdict:'REPLAT' },
  { g:'risk',  id:'branch',          name:'Branch & ATM ops',                          current:'On-prem servers',                      future:'Edge + cloud control plane', stack:'AZURE', verdict:'REPLAT' }
];

const GROUPS = {
  core:  { name:'Banking Core',         icon:'🏦' },
  cards: { name:'Cards & Loyalty',      icon:'💳' },
  cust:  { name:'Customer Lifecycle',   icon:'👥' },
  risk:  { name:'Risk · Compliance · Ops', icon:'⚠' }
};

const VERDICT_META = {
  REHOST:   { name:'Rehost',     color:'#3D8EFF', eff:'2-3 mo',  risk:'Low'  },
  REPLAT:   { name:'Replatform', color:'#0FD49A', eff:'4-6 mo',  risk:'Low'  },
  REFACT:   { name:'Refactor',   color:'#FF8030', eff:'6-9 mo',  risk:'Med'  },
  REARCH:   { name:'Rearchitect',color:'#FF4D6A', eff:'9-12 mo', risk:'High' },
  REBUILD:  { name:'Rebuild',    color:'#9B72FF', eff:'10-14 mo',risk:'High' },
  REPLACE:  { name:'Replace',    color:'#A0357A', eff:'6-10 mo', risk:'Med'  },
  RETAIN:   { name:'Retain',     color:'#5B6B8A', eff:'0 mo',    risk:'None' }
};

const TABS = ['infra','apps','data','integ','ops'];

function saveState() {
  STATE.updatedAt = new Date().toISOString();
  try { localStorage.setItem(STATE_KEY, JSON.stringify(STATE)); } catch (e) {}
  const el = document.getElementById('ds-save');
  if (el) { el.innerHTML = '<span class="dot">●</span> Auto-saved · ' + new Date().toLocaleTimeString(); }
}
function loadState() {
  try { const raw = localStorage.getItem(STATE_KEY); if (raw) STATE = Object.assign(STATE, JSON.parse(raw)); }

}
function resetState() {
  if (!confirm('Reset Discovery and start over? Saved progress will be erased.')) return;
  STATE = { step:'mode', mode:null, selected:[], detail:{}, activeCap:null, activeTab:'infra', results:null, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };

/* Debounced save on any change */
let saveTimer = null;
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveState, 800); }

/* ── 7R rules engine ────────────────────────────────── */
function compute7R() {
  // Use the per-capability default verdict as the baseline.
  // Adjustments from inventory data could be added here later.
  const results = STATE.selected.map(id => {
    const cap = CAPS.find(c => c.id === id);
    if (!cap) return null;
    const verdictKey = cap.verdict;
    const meta = VERDICT_META[verdictKey];
    // Compose rationale based on critical flag + complexity
    const det = (STATE.detail[id] && STATE.detail[id].infra) || DEFAULT_DETAIL.infra;
    const cx = det.complexity || 'moderate';
    let why = '';
    if (verdictKey === 'REARCH')  why = 'Critical workload, declining skills, regulatory pressure. Rehost would not unlock the new capability.';
    if (verdictKey === 'REPLAT')  why = 'Stable, well-documented, vendor pattern available. Modest effort for big OPEX reduction.';
    if (verdictKey === 'REFACT')  why = 'Codebase is cloud-friendly; needs event-driven backbone. Big agility win.';
    if (verdictKey === 'REHOST')  why = 'Quick win — port to containers. Buys time while bigger systems modernize.';
    if (verdictKey === 'REPLACE') why = 'Tech is unsupported. Building in-house would burn budget; SaaS players are mature.';
    if (verdictKey === 'REBUILD') why = 'Existing system has structural defects beyond refactor. Cleaner to rebuild on a modern stack.';
    if (verdictKey === 'RETAIN')  why = 'Recently modernized or low business impact. Defer modernization.';
    return {
      id, name: cap.name, current: cap.current, future: cap.future,
      verdict: verdictKey, verdictName: meta.name, color: meta.color, risk: meta.risk, eff: meta.eff,
      stack: cap.stack, why,
      complexity: cx, critical: !!cap.critical
    };
  }).filter(Boolean);

  const mixTotal = results.length || 1;
  const mix = {};
  Object.keys(VERDICT_META).forEach(k => mix[k] = 0);
  results.forEach(r => mix[r.verdict]++);

  return { capabilities: results, mix, mixTotal };
}

/* ── Stepper rendering ──────────────────────────────── */
const STEPS = [
  { id:'mode',   label:'Start'        },
  { id:'scope',  label:'Capabilities' },

  { id:'result', label:'7R map'       }
];
function renderStepper() {
  const el = document.getElementById('ds-steps');
  if (!el) return;
  const idx = STEPS.findIndex(s => s.id === STATE.step);
  el.innerHTML = STEPS.map((s, i) => {
    const cls = i < idx ? 'done' : (i === idx ? 'act' : '');
    return '<div class="ds-step ' + cls + '" data-i="' + i + '" onclick="gotoStep(\'' + s.id + '\')"><div class="n">' + (i < idx ? '✓' : (i+1)) + '</div><div class="l">' + s.label + '</div></div>' +
           (i < STEPS.length - 1 ? '<span class="arrow">▸</span>' : '');
  }).join('');
}
function gotoStep(id) {
  // Guard: can't jump forward without prereqs
  if (id === 'scope' && !STATE.mode) return;
  if (id === 'detail' && (!STATE.mode || STATE.selected.length === 0)) return;
  if (id === 'result' && (!STATE.mode || STATE.selected.length === 0)) return;
  STATE.step = id;
  if (id === 'detail' && !STATE.activeCap && STATE.selected[0]) STATE.activeCap = STATE.selected[0];
  if (id === 'result') STATE.results = compute7R();
  saveState();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderScope() {
  const groups = {};
  CAPS.forEach(c => { if (!groups[c.g]) groups[c.g] = []; groups[c.g].push(c); });
  const selSet = new Set(STATE.selected);
  let html = '<div class="ds-cap-card fadeUp">';
  Object.keys(GROUPS).forEach(gKey => {
    const list = groups[gKey] || [];
    const selCount = list.filter(c => selSet.has(c.id)).length;
    html += '<div class="ds-cap-group">' +
      '<div class="ds-cap-group-head">' + GROUPS[gKey].icon + ' ' + GROUPS[gKey].name + ' <span class="ct">· ' + selCount + ' of ' + list.length + ' selected</span><div class="div"></div><a class="all" onclick="toggleGroup(\'' + gKey + '\')">Select all</a></div>' +
      '<div class="ds-cap-grid">';
    list.forEach(c => {
      const checked = selSet.has(c.id);
      html += '<label class="ds-cap ' + (checked ? 'checked' : '') + '" data-id="' + c.id + '">' +
        '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleCap(\'' + c.id + '\', this.checked)">' +

        (c.critical ? '<span class="crit">CRIT</span>' : '') +

  });

      '</button>' +
    '</div>' +

  return html;
}

function estimateMinutes(n) {
  if (STATE.mode === 'quick') return Math.max(1, Math.round(n * 0.3));
  return Math.max(2, Math.round(n * 1.8));
}

function toggleCap(id, on) {
  if (on && !STATE.selected.includes(id)) STATE.selected.push(id);
  if (!on) STATE.selected = STATE.selected.filter(x => x !== id);
  // Update visual + footer + group counts without full re-render
  scheduleSave();
  render();
}
function toggleGroup(gKey) {
  const list = CAPS.filter(c => c.g === gKey).map(c => c.id);
  const selSet = new Set(STATE.selected);
  const allOn = list.every(id => selSet.has(id));
  if (allOn) STATE.selected = STATE.selected.filter(id => !list.includes(id));
  else list.forEach(id => { if (!selSet.has(id)) STATE.selected.push(id); });
  scheduleSave();
  render();
}

      '<input type="range" min="0" max="100" value="' + v + '" oninput="setField(\'' + cap.id + '\',\'' + tab + '\',\'' + key + '\',+this.value);this.nextElementSibling.textContent=this.value+\'%\'" style="flex:1;accent-color:var(--gold)">' +
      '<span style="font-size:13px;font-weight:700;color:var(--gold);font-family:var(--f-mono);min-width:42px;text-align:right">' + v + '%</span>' +
    '</div>' +
  '</div>';
}
function complexityField(det, cap, tab) {
  const opts = [['simple','Simple'],['moderate','Moderate'],['complex','Complex'],['highly','Highly complex']];
  const cur = det.complexity || 'moderate';
  return '<div class="ds-field" style="grid-column:1 / -1;margin-top:14px">' +
    '<label>Complexity rating</label>' +
    '<div class="ds-complexity">' +
      opts.map(([k,n]) =>
        '<input type="radio" id="cx-' + k + '" name="cx" value="' + k + '"' + (cur === k ? ' checked' : '') + ' onchange="setField(\'' + cap.id + '\',\'' + tab + '\',\'complexity\',\'' + k + '\')">' +
        '<label for="cx-' + k + '">' + n + '</label>'
      ).join('') +
    '</div>' +
  '</div>';
}
function advancedField(tab, cap, det) {
  return '<div class="ds-advanced ' + (det._advanced ? 'open' : '') + '" id="adv-' + tab + '">' +
    '<button class="ds-advanced-tog" onclick="toggleAdvanced(\'' + cap.id + '\',\'' + tab + '\')">Show advanced — exact counts (for DBAs)</button>' +
    '<div class="ds-advanced-body">' +
      '<div class="ds-field"><label>Exact count</label><input type="number" placeholder="e.g. 247" value="' + (det._exact || '') + '" oninput="setField(\'' + cap.id + '\',\'' + tab + '\',\'_exact\',this.value)"></div>' +
      '<div class="ds-field"><label>Free-text notes</label><input type="text" placeholder="e.g. PMTPROC.cbl is the hot path" value="' + (det._notes || '') + '" oninput="setField(\'' + cap.id + '\',\'' + tab + '\',\'_notes\',this.value)"></div>' +
    '</div>' +
  '</div>';
}

function setField(capId, tab, key, val) {
  STATE.detail[capId] = STATE.detail[capId] || {};
  STATE.detail[capId][tab] = STATE.detail[capId][tab] || Object.assign({}, DEFAULT_DETAIL[tab]);
  STATE.detail[capId][tab][key] = val;
  scheduleSave();
}
function toggleAdvanced(capId, tab) {
  STATE.detail[capId] = STATE.detail[capId] || {};
  STATE.detail[capId][tab] = STATE.detail[capId][tab] || Object.assign({}, DEFAULT_DETAIL[tab]);
  STATE.detail[capId][tab]._advanced = !STATE.detail[capId][tab]._advanced;
  saveState();
  render();
}
function selectCap(id) { STATE.activeCap = id; STATE.activeTab = 'infra'; saveState(); render(); }
function prevCap() {
  const i = STATE.selected.indexOf(STATE.activeCap);
  if (i > 0) selectCap(STATE.selected[i - 1]);
}
function nextCap() {
  const i = STATE.selected.indexOf(STATE.activeCap);
  if (i < STATE.selected.length - 1) selectCap(STATE.selected[i + 1]);
}
function markDone() {
  STATE.detail[STATE.activeCap] = STATE.detail[STATE.activeCap] || {};
  STATE.detail[STATE.activeCap]._done = !STATE.detail[STATE.activeCap]._done;
  saveState();
  render();
}
function resetCapDetail() {
  if (!confirm('Reset all fields for this capability to peer benchmarks?')) return;
  STATE.detail[STATE.activeCap] = {};
  saveState();
  render();
}
function copyFromPrev() {
  const i = STATE.selected.indexOf(STATE.activeCap);
  if (i === 0) { window.DI && window.DI.toast({ kind:'warn', title:'No previous', message:'This is the first capability.' }); return; }
  const prevId = STATE.selected[i - 1];
  if (STATE.detail[prevId]) {
    STATE.detail[STATE.activeCap] = JSON.parse(JSON.stringify(STATE.detail[prevId]));
    delete STATE.detail[STATE.activeCap]._done;
    saveState();
    render();
    window.DI && window.DI.toast({ kind:'ok', title:'Copied', message:'Detail copied from ' + (CAPS.find(c=>c.id===prevId).name) + '.' });
  }
}

/* Result step */
function renderResult() {
  const r = STATE.results || compute7R();
  STATE.results = r;

  // Effort/savings/risk rollups
  const effortMonths = r.capabilities.reduce((sum, c) => {
    const m = (VERDICT_META[c.verdict].eff.match(/\d+/g) || ['6']).pop();
    return sum + (parseInt(m) || 6);
  }, 0);
  const peakEffort = Math.max(...r.capabilities.map(c => parseInt((VERDICT_META[c.verdict].eff.match(/\d+/g) || ['6']).pop()) || 6));
  const totalDuration = Math.max(12, Math.min(24, Math.round(effortMonths * 0.35)));  // parallelized
  const savings = Math.round(r.capabilities.length * 340);   // $K per cap rough estimate
  const risk = r.capabilities.filter(c => c.risk === 'High').length;

  const mixOrder = ['REHOST','REPLAT','REFACT','REARCH','REBUILD','REPLACE','RETAIN'];
  const mixHtml = mixOrder.filter(k => r.mix[k] > 0).map(k => {
    const pct = Math.round((r.mix[k] / r.mixTotal) * 100);
    return '<div style="background:' + VERDICT_META[k].color + ';width:' + pct + '%">' + r.mix[k] + ' ' + VERDICT_META[k].name + '</div>';
  }).join('');
  const legendHtml = mixOrder.map(k => '<span style="--c:' + VERDICT_META[k].color + '">' + VERDICT_META[k].name + ' · ' + (r.mix[k] || 0) + '</span>').join('');

  let html = '<div class="ds-result-hero fadeUp">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap">' +
      '<div><div class="ds-eyebrow">7R MODERNIZATION RECOMMENDATION</div><h2 style="font-family:var(--f-head);font-size:22px;font-weight:600">' + r.capabilities.length + ' capabilities mapped. <em style="color:var(--gold)">Here is your move.</em></h2></div>' +
      '<div class="ds-result-stats">' +
        '<div class="ds-result-stat"><div class="lbl">DURATION</div><div class="val">' + totalDuration + ' mo</div></div>' +
        '<div class="ds-result-stat ok"><div class="lbl">EST. SAVINGS / 3 YR</div><div class="val">$' + (savings/1000).toFixed(1) + 'M</div></div>' +
        '<div class="ds-result-stat warn"><div class="lbl">HIGH-RISK CAPS</div><div class="val">' + risk + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:14px"><div class="ds-eyebrow">YOUR 7R MIX</div><div class="ds-mix-bar">' + mixHtml + '</div><div class="ds-mix-legend">' + legendHtml + '</div></div>' +
  '</div>';

  // Cards grid
  html += '<div class="ds-7r-grid">';
  r.capabilities.forEach(c => {
    html += '<div class="ds-7r-card" style="--c:' + c.color + '">' +
      '<div class="head">' +
        '<div><div class="name">' + c.name + '</div><div class="stack">' + c.current + ' → ' + c.future + '</div></div>' +
        '<span class="verdict">' + c.verdictName.toUpperCase() + '</span>' +
      '</div>' +
      '<div class="stats"><span>Target: <strong>' + c.stack + '</strong></span><span>Risk: <strong>' + c.risk + '</strong></span><span>Effort: <strong>' + c.eff + '</strong></span></div>' +
      '<div class="why"><strong>Why ' + c.verdictName + ':</strong> ' + c.why + '</div>' +
    '</div>';
  });
  html += '</div>';

  // CTA strip
  html += '<div class="ds-cta-strip">' +
    '<div><div class="lbl">NEXT STEPS</div><div class="h">Send this 7R map onward.</div><div class="sub">Architecture builds To-Be diagrams · Governance spins up RAID + timeline + cost.</div></div>' +
    '<div class="actions">' +
      '<button class="primary" onclick="sendTo(\'architecture\')">Send to Architecture →</button>' +
      '<button class="ghost" onclick="sendTo(\'governance\')">Send to Governance →</button>' +
      '<button class="ghost" onclick="exportJSON()">⬇ Export JSON</button>' +
    '</div>' +
  '</div>';

  // Reset + Edit
  html += '<div class="ds-foot" style="margin-top:14px">' +
    '<div class="summary">7R generated at ' + new Date().toLocaleString() + ' · ' + r.capabilities.length + ' capabilities</div>' +
    '<div class="actions">' +
      '<button class="ghost" onclick="gotoStep(\'detail\')">← Edit detail</button>' +
      '<button class="ghost" onclick="gotoStep(\'scope\')">← Edit capabilities</button>' +
      '<button class="danger" onclick="resetState()">Reset everything</button>' +
    '</div>' +
  '</div>';

  return html;
}

function sendTo(where) {
  if (!STATE.results) return;
  // Store the handoff payload for the target page to consume
  const handoff = {
    source: 'discovery-studio',
    sentAt: new Date().toISOString(),
    capabilities: STATE.results.capabilities,
    mix: STATE.results.mix
  };
  try { localStorage.setItem('di_handoff_' + where, JSON.stringify(handoff)); } catch(e) {}
  window.DI && window.DI.toast && window.DI.toast({
    kind:'ok', icon:'📤', title:'Sent to ' + (where === 'architecture' ? 'Architecture Studio' : 'Program Governance'),
    message: STATE.results.capabilities.length + ' capabilities handed off. Opening the receiver…',
    duration: 4000
  });
  setTimeout(() => { location.href = where === 'architecture' ? 'architecture-studio.html?from=discovery' : 'program-governance.html?from=discovery'; }, 800);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'discovery-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 100);
  window.DI && window.DI.toast && window.DI.toast({ kind:'ok', title:'Exported', message:'Discovery JSON downloaded.' });
}

/* ── Render dispatcher ────────────────────────────── */
function render() {
  renderStepper();
  renderHero();
  const el = document.getElementById('ds-app');
  if (!el) return;
  if (STATE.step === 'mode')    el.innerHTML = renderMode();
  else if (STATE.step === 'scope')   el.innerHTML = renderScope();
  else if (STATE.step === 'detail')  el.innerHTML = renderDetail();
  else if (STATE.step === 'result')  el.innerHTML = renderResult();
}

/* ── Bootstrap ─────────────────────────────────────── */
loadState();
render();
// Periodic save indicator update so users see "5s ago" style hints
setInterval(() => {
  if (STATE.updatedAt) {
    const el = document.getElementById('ds-save');
    if (el) el.innerHTML = '<span class="dot">●</span> Auto-saved · ' + timeAgo(STATE.updatedAt);
  }
}, 15000);
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  return Math.floor(s/3600) + ' hr ago';
}
</script>

</html>
