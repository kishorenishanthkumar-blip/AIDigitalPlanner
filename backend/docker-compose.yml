services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: di-platform-app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: di-platform-db
    environment:
      POSTGRES_USER: di_user
      POSTGRES_PASSWORD: di_pass
      POSTGRES_DB: di_platform
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U di_user -d di_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: di-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
