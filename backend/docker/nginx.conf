# Optional reverse-proxy config — only used if you add an nginx service.
worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;

    upstream di_app {
        server app:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://di_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            proxy_pass http://di_app/health;
        }
    }
}
