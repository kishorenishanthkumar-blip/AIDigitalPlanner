<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Program Governance · DI Platform</title>
<meta name="description" content="Program Governance — RAID register, 7-R timeline, cost model, MS Project XML export."/>
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/toasts.js" defer></script>
<script src="assets/audit.js" defer></script>
<script src="assets/cmdk.js" defer></script>
<script src="assets/top-bar.js" defer></script>
<script src="assets/pricing.js" defer></script>
<script src="assets/nishi-dock.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas-2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;overflow-x:hidden;min-height:100vh}
button{font-family:var(--f-ui);cursor:pointer;border:none}
a{color:var(--gold);text-decoration:none}

/* Hero */
.pg-hero{padding:24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff,var(--canvas))}
.pg-hero-wrap{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px}
.pg-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.pg-h1{font-family:var(--f-head);font-size:24px;font-weight:600;line-height:1.18}
.pg-h1 em{font-style:italic;color:var(--gold)}
.pg-stats{display:flex;gap:10px;flex-wrap:wrap}
.pg-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 14px;min-width:130px;text-align:center}
.pg-stat.red{background:var(--red-bg);border-color:var(--red)}
.pg-stat.ok {background:var(--green-bg);border-color:var(--green)}
.pg-stat .lbl{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--ink-2);text-transform:uppercase;margin-bottom:2px}
.pg-stat .val{font-family:var(--f-head);font-size:20px;font-weight:600}
.pg-stat.red .val{color:var(--red)}
.pg-stat.ok .val{color:#0A8462}

/* Tabs */
.pg-tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 24px}
.pg-tabs-wrap{max-width:1400px;margin:0 auto;display:flex;gap:4px;overflow-x:auto}
.pg-tab{padding:12px 18px;background:transparent;border:none;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;white-space:nowrap}
.pg-tab:hover{color:var(--ink)}
.pg-tab.act{color:var(--gold);border-bottom-color:var(--gold)}

/* Toolbar */
.pg-toolbar{background:#fff;border-bottom:1px solid var(--border);padding:11px 24px}
.pg-toolbar-wrap{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.pg-toolbar .meta{font-size:11.5px;color:var(--ink-2)}
.pg-toolbar .actions{display:flex;gap:6px;flex-wrap:wrap}
.pg-toolbar .actions button{background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:11.5px;color:var(--ink);font-family:inherit}
.pg-toolbar .actions button:hover{border-color:var(--gold);color:var(--gold)}
.pg-toolbar .actions .primary{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
.pg-toolbar .actions .primary:hover{background:var(--gold-2)}

/* Body */
.pg-body{max-width:1400px;margin:0 auto;padding:22px 24px 36px}

/* RAID table */
.pg-raid{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.pg-raid table{border-collapse:collapse;width:100%;font-size:12.5px}
.pg-raid thead th{background:var(--canvas);font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.pg-raid td{padding:12px 14px;border-bottom:1px solid var(--canvas-2);vertical-align:top}
.pg-raid tr:hover td{background:var(--canvas)}
.pg-raid .type{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;display:inline-block}
.pg-raid .type.R{background:var(--red-bg);color:var(--red)}
.pg-raid .type.A{background:var(--blue-bg);color:var(--blue)}
.pg-raid .type.I{background:var(--orange-bg);color:var(--orange)}
.pg-raid .type.D{background:var(--purple-bg);color:var(--purple)}
.pg-raid .sev{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;display:inline-block;color:#fff}
.pg-raid .sev.high{background:var(--red)}
.pg-raid .sev.med {background:var(--orange)}
.pg-raid .sev.low {background:var(--green)}
.pg-raid .desc{font-size:12px;line-height:1.55}
.pg-raid [contenteditable]{padding:2px 4px;margin:0 -4px;border-radius:4px;outline:none;cursor:text}
.pg-raid [contenteditable]:hover{background:rgba(200,146,26,.06)}
.pg-raid [contenteditable]:focus{background:#FFFCF4;box-shadow:0 0 0 2px rgba(200,146,26,.25)}
.pg-raid select{font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--ink)}
.pg-raid .owner{font-size:11px;color:var(--ink)}
.pg-raid .delete-btn{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px}
.pg-raid .delete-btn:hover{background:var(--red-bg)}
.pg-raid-add{padding:12px 16px;background:var(--canvas);border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.pg-raid-add button{background:#fff;border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:11px;color:var(--ink);font-family:inherit;cursor:pointer}
.pg-raid-add button:hover{border-color:var(--gold);color:var(--gold)}

/* Filter chips */
.pg-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pg-filter{font-size:11px;background:#fff;border:1px solid var(--border);border-radius:99px;padding:5px 11px;cursor:pointer;color:var(--ink-2)}
.pg-filter.act{background:var(--aglow);border-color:var(--gold-2);color:var(--ink);font-weight:700}

/* 7-R Gantt */
.pg-gantt{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:auto}
.pg-gantt-wrap{min-width:1100px}
.pg-gantt-head{display:grid;grid-template-columns:280px 1fr;border-bottom:1px solid var(--border);background:var(--canvas)}
.pg-gantt-head .name{padding:10px 14px;font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;border-right:1px solid var(--border)}
.pg-gantt-head .months{display:grid;grid-template-columns:repeat(18,1fr)}
.pg-gantt-head .months div{padding:10px 4px;text-align:center;font-size:9.5px;font-weight:700;color:var(--ink-2);border-right:1px solid var(--canvas-2);letter-spacing:.04em}
.pg-gantt-row{display:grid;grid-template-columns:280px 1fr;border-bottom:1px solid var(--canvas-2);position:relative}
.pg-gantt-row:hover{background:var(--canvas)}
.pg-gantt-row .name{padding:10px 14px;border-right:1px solid var(--border);font-size:12px}
.pg-gantt-row .name .cap-name{font-weight:700;font-size:12px}
.pg-gantt-row .name .cap-meta{font-size:10px;color:var(--ink-2);margin-top:1px}
.pg-gantt-bar-track{position:relative;display:grid;grid-template-columns:repeat(18,1fr);align-items:center;padding:6px 0}
.pg-gantt-bar-track > .col{border-right:1px dashed var(--canvas-2);height:24px}
.pg-gantt-bar{position:absolute;height:22px;border-radius:5px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;top:6px;box-shadow:0 2px 6px -2px rgba(0,0,0,.2)}
.pg-gantt-bar.REHOST   {background:#3D8EFF}
.pg-gantt-bar.REPLAT   {background:#0FD49A}
.pg-gantt-bar.REFACT   {background:#FF8030}
.pg-gantt-bar.REARCH   {background:#FF4D6A}
.pg-gantt-bar.REBUILD  {background:#9B72FF}
.pg-gantt-bar.REPLACE  {background:#A0357A}
.pg-gantt-bar.RETAIN   {background:#5B6B8A}

/* Cost model */
.pg-cost-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
@media (max-width:900px){.pg-cost-grid{grid-template-columns:1fr}}
.pg-cost-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.pg-cost-card .lbl{font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase}
.pg-cost-card .val{font-family:var(--f-head);font-size:26px;font-weight:600;margin-top:4px}
.pg-cost-card .val.green{color:#0A8462}
.pg-cost-card .val.gold{color:var(--gold)}
.pg-cost-card .sub{font-size:11.5px;color:var(--ink-2);margin-top:4px}
.pg-cost-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;margin-top:10px}
.pg-cost-bar .seg{background:var(--gold)}

/* Runlog */
.pg-runlog{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 20px}
.pg-runlog-entry{display:grid;grid-template-columns:160px 32px 1fr;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border)}
.pg-runlog-entry:last-child{border-bottom:none}
.pg-runlog-entry .time{font-size:11px;color:var(--ink-2);font-family:var(--f-mono)}
.pg-runlog-entry .ic{font-size:13px;text-align:center}
.pg-runlog-entry .msg{font-size:12.5px}
.pg-runlog-entry .msg strong{color:var(--ink)}

/* Empty */
.pg-empty{text-align:center;padding:60px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;color:var(--ink-2)}
.pg-empty h2{font-family:var(--f-head);font-size:20px;color:var(--ink);margin-bottom:8px}
.pg-empty p{font-size:13px;max-width:480px;margin:0 auto 14px;line-height:1.55}
.pg-empty .actions a,.pg-empty .actions button{background:var(--gold);color:#fff;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;text-decoration:none;border:none;font-family:inherit;cursor:pointer;margin:0 4px}
.pg-empty .actions .ghost{background:#fff;color:var(--ink);border:1px solid var(--border)}

/* Banner */
.pg-banner{background:#FFFCF4;border:1px solid var(--gold-2);border-radius:10px;padding:11px 14px;font-size:12px;color:#7A5F10;margin-bottom:14px;display:flex;align-items:center;gap:10px;line-height:1.55}
.pg-banner strong{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .35s ease both}
</style>
</head>
<body>

<div data-di-topbar></div>

<!-- Hero -->
<section class="pg-hero" id="pg-hero"></section>

<!-- Tabs -->
<nav class="pg-tabs"><div class="pg-tabs-wrap" id="pg-tabs"></div></nav>

<!-- Toolbar (per tab) -->
<div class="pg-toolbar"><div class="pg-toolbar-wrap" id="pg-toolbar"></div></div>

<!-- Body -->
<main class="pg-body" id="pg-body"></main>

<script>
/* ═══════════════════════════════════════════════════════
   Program Governance · Phase 16
   Reads di_handoff_governance from Architecture.
═══════════════════════════════════════════════════════ */

const PG_KEY = 'di_governance_v1';
let INPUT = null;
let STATE = {
  tab: 'raid',
  raid: [],
  raidFilter: 'all',
  runlog: [],
  capabilities: [],
  filters: null,
  durationMonths: 14,
  fixedPrice: 3950000,
  createdAt: null,
  updatedAt: null
};

const TABS = [
  { id:'raid',    label:'📋 RAID Register' },
  { id:'gantt',   label:'📅 7-R Timeline' },
  { id:'cost',    label:'💰 Cost Model' },
  { id:'runlog',  label:'📜 Runlog' }
];

const RAID_SEED = {
  R: [
    { sev:'high', desc:'Mainframe COBOL skills are declining; risk to Payments rearchitect timeline.', owner:'CTO',     status:'Open' },
    { sev:'high', desc:'BCBS 239 deadline puts pressure on Risk &amp; Compliance rearchitect wave.', owner:'CRO',     status:'Open' },
    { sev:'med',  desc:'Cloud egress costs underestimated in initial TCO; needs FinOps review.',     owner:'FinOps',  status:'Open' },
    { sev:'med',  desc:'Vendor lock-in if cards loyalty fully migrates to single SaaS.',             owner:'Procurement', status:'Open' },
    { sev:'low',  desc:'Time-zone overlap with partner team in APAC limits sync windows.',           owner:'PMO',     status:'Mitigated' }
  ],
  A: [
    { sev:'',     desc:'Assumes ' + 'Client' + ' provides one Product Owner per capability for ≥ 50% of program duration.', owner:'PMO',    status:'Confirmed' },
    { sev:'',     desc:'Assumes existing identity / SSO stack works for all new cloud-native services.', owner:'CISO',    status:'Confirmed' },
    { sev:'',     desc:'Assumes hyperscaler enterprise rate of 18% (subject to procurement negotiation).', owner:'Procurement', status:'Pending' }
  ],
  I: [
    { sev:'high', desc:'AS/400 RPG → Postgres test data not yet anonymised; blocking Deposits Replatform.', owner:'Data Steward', status:'Open' },
    { sev:'med',  desc:'Treasury Solaris servers EOL in 14 months; cutover must finish before then.',    owner:'Infra',     status:'Open' }
  ],
  D: [
    { sev:'',     desc:'Depends on Architecture Studio sign-off (M1 deliverable).',                       owner:'Architect', status:'Active' },
    { sev:'',     desc:'Depends on FinOps tooling (Cloudability or AWS Cost Explorer) being installed before M2.', owner:'FinOps', status:'Pending' },
    { sev:'',     desc:'Depends on Snowflake account provisioning for unified risk data platform.',      owner:'Data',      status:'Pending' }
  ]
};

const TYPE_LABEL = { R:'Risk', A:'Assumption', I:'Issue', D:'Dependency' };

function loadInput() {
  try { INPUT = JSON.parse(localStorage.getItem('di_handoff_governance') || 'null'); } catch (e) {}
  try { Object.assign(STATE, JSON.parse(localStorage.getItem(PG_KEY) || '{}')); } catch (e) {}
}
function saveState() { STATE.updatedAt = new Date().toISOString(); try { localStorage.setItem(PG_KEY, JSON.stringify(STATE)); } catch (e) {} }

function consumeHandoff() {
  if (!INPUT || !INPUT.capabilities) return false;
  STATE.capabilities = INPUT.capabilities;
  STATE.filters = INPUT.filters || {};
  // Seed RAID if empty
  if (STATE.raid.length === 0) {
    let counter = 1;
    ['R','A','I','D'].forEach(type => {
      RAID_SEED[type].forEach(item => {
        STATE.raid.push({
          id: 'P-' + String(counter++).padStart(3, '0'),
          type: type,
          sev: item.sev || 'low',
          desc: item.desc,
          owner: item.owner,
          status: item.status,
          createdAt: new Date().toISOString()
        });
      });
    });
  }
  // Seed runlog
  if (STATE.runlog.length === 0) {
    STATE.runlog.push(
      { time: new Date().toISOString(), ic:'📥', msg:'Received architecture handoff · <strong>' + INPUT.capabilities.length + ' capabilities</strong> imported · 7R verdicts locked.' },
      { time: new Date().toISOString(), ic:'📋', msg:'Seeded RAID register with <strong>' + STATE.raid.length + ' items</strong> from peer-bank template.' },
      { time: new Date().toISOString(), ic:'📅', msg:'7-R timeline drafted across 3 parallel waves (Cards · Core · Risk &amp; Reg).' }
    );
  }
  STATE.createdAt = STATE.createdAt || new Date().toISOString();
  saveState();
  return true;
}

function fmt(n) {
  if (!isFinite(n)) return '—';
  const c = (STATE.filters && STATE.filters.currency) || 'USD';
  if (Math.abs(n) >= 1000000) return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:1 }).format(n/1000000).replace(/\.0/,'') + 'M';
  if (Math.abs(n) >= 1000)    return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:0 }).format(n/1000) + 'K';
  return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:0 }).format(n);
}

/* ── Render hero ────────────────────────────────────── */
function renderHero() {
  const el = document.getElementById('pg-hero');
  const caps = STATE.capabilities;
  const open = STATE.raid.filter(r => r.status === 'Open').length;
  const high = STATE.raid.filter(r => r.sev === 'high' && r.status === 'Open').length;
  const monthly = caps.reduce((s, c) => s + (c.monthly || 0), 0);

  el.innerHTML = '<div class="pg-hero-wrap fadeUp">' +
    '<div><div class="pg-eyebrow">PROGRAM GOVERNANCE · ' + caps.length + ' CAPABILITIES</div>' +
      '<h1 class="pg-h1">RAID, timeline, cost — <em>your migration control tower.</em></h1></div>' +
    '<div class="pg-stats">' +
      '<div class="pg-stat ' + (high > 0 ? 'red' : 'ok') + '"><div class="lbl">HIGH-SEV OPEN</div><div class="val">' + high + '</div></div>' +
      '<div class="pg-stat"><div class="lbl">TOTAL RAID</div><div class="val">' + STATE.raid.length + '</div></div>' +
      '<div class="pg-stat"><div class="lbl">DURATION</div><div class="val">' + STATE.durationMonths + ' mo</div></div>' +
      '<div class="pg-stat"><div class="lbl">CLOUD COST / MO</div><div class="val">' + fmt(monthly) + '</div></div>' +
    '</div>' +
  '</div>';
}

/* ── Render tabs + toolbar ──────────────────────────── */
function renderTabs() {
  document.getElementById('pg-tabs').innerHTML = TABS.map(t =>
    '<button class="pg-tab ' + (STATE.tab === t.id ? 'act' : '') + '" onclick="selectTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');
}
function selectTab(id) { STATE.tab = id; saveState(); renderBody(); renderToolbar(); renderTabs(); }

function renderToolbar() {
  const el = document.getElementById('pg-toolbar');
  if (STATE.tab === 'raid') {
    el.innerHTML =
      '<div class="meta">' + STATE.raid.length + ' items · click any cell to edit</div>' +
      '<div class="actions">' +
        '<button onclick="addRaidRow(\'R\')">+ Risk</button>' +
        '<button onclick="addRaidRow(\'A\')">+ Assumption</button>' +
        '<button onclick="addRaidRow(\'I\')">+ Issue</button>' +
        '<button onclick="addRaidRow(\'D\')">+ Dependency</button>' +
        '<button onclick="exportRAID()">⬇ Export CSV</button>' +
      '</div>';
  } else if (STATE.tab === 'gantt') {
    el.innerHTML =
      '<div class="meta">3 parallel waves · ' + STATE.capabilities.length + ' capabilities · ' + STATE.durationMonths + ' months total</div>' +
      '<div class="actions">' +
        '<button class="primary" onclick="exportMSProject()">⬇ MS Project XML</button>' +
        '<button onclick="exportGanttCSV()">⬇ CSV</button>' +
      '</div>';
  } else if (STATE.tab === 'cost') {
    el.innerHTML =
      '<div class="meta">Live from pricing library · refreshed ' + (window.DI && window.DI.pricing ? new Date(window.DI.pricing.refreshedAt).toLocaleDateString() : 'unknown') + '</div>' +
      '<div class="actions">' +
        '<button onclick="exportCostCSV()">⬇ Cost breakdown CSV</button>' +
      '</div>';
  } else if (STATE.tab === 'runlog') {
    el.innerHTML =
      '<div class="meta">' + STATE.runlog.length + ' events · append-only</div>' +
      '<div class="actions">' +
        '<button onclick="exportRunlog()">⬇ Export</button>' +
      '</div>';
  }
}

/* ── Render body ────────────────────────────────────── */
function renderBody() {
  const el = document.getElementById('pg-body');
  const caps = STATE.capabilities;

  if (!caps.length) {
    el.innerHTML = '<div class="pg-empty">' +
      '<h2>No data yet</h2>' +
      '<p>Program Governance receives capabilities + 7R verdicts from Architecture Studio. Run Discovery → Architecture first, then click <strong>Send to Governance</strong>.</p>' +
      '<div class="actions"><a href="discovery-studio.html">Start with Discovery →</a> <button class="ghost" onclick="loadSample()">Load sample</button></div>' +
    '</div>';
    return;
  }

  // Source banner
  let banner = '';
  if (INPUT && INPUT.source) {
    banner = '<div class="pg-banner">📥 <div>Imported from <strong>' + (INPUT.source === 'architecture' ? 'Architecture Studio' : INPUT.source) + '</strong>: ' + caps.length + ' capabilities with 7R verdicts and live pricing.</div></div>';
  }

  if (STATE.tab === 'raid')   el.innerHTML = banner + renderRAID();
  if (STATE.tab === 'gantt')  el.innerHTML = banner + renderGantt();
  if (STATE.tab === 'cost')   el.innerHTML = banner + renderCost();
  if (STATE.tab === 'runlog') el.innerHTML = banner + renderRunlog();
}

/* ── RAID register ──────────────────────────────────── */
function renderRAID() {
  const filtered = STATE.raid.filter(r => STATE.raidFilter === 'all' || r.type === STATE.raidFilter || (STATE.raidFilter === 'open' && r.status === 'Open') || (STATE.raidFilter === 'high' && r.sev === 'high'));

  let html = '<div class="pg-filters">' +
    ['all','R','A','I','D','open','high'].map(k =>
      '<button class="pg-filter ' + (STATE.raidFilter === k ? 'act' : '') + '" onclick="STATE.raidFilter=\'' + k + '\';saveState();renderBody()">' +
        (k === 'all' ? 'All ' + STATE.raid.length :
         k === 'R'   ? 'Risks · ' + STATE.raid.filter(r=>r.type==='R').length :
         k === 'A'   ? 'Assumptions · ' + STATE.raid.filter(r=>r.type==='A').length :
         k === 'I'   ? 'Issues · ' + STATE.raid.filter(r=>r.type==='I').length :
         k === 'D'   ? 'Dependencies · ' + STATE.raid.filter(r=>r.type==='D').length :
         k === 'open'? 'Open · ' + STATE.raid.filter(r=>r.status==='Open').length :
                       'High severity · ' + STATE.raid.filter(r=>r.sev==='high').length) +
      '</button>'
    ).join('') +
  '</div>';

  html += '<div class="pg-raid"><table><thead><tr>' +
    '<th>ID</th><th>Type</th><th>Severity</th><th>Description</th><th>Owner</th><th>Status</th><th></th>' +
  '</tr></thead><tbody>';
  filtered.forEach((r, idx) => {
    const realIdx = STATE.raid.indexOf(r);
    html += '<tr>' +
      '<td style="font-family:var(--f-mono);font-weight:700;color:var(--ink-2)">' + r.id + '</td>' +
      '<td><span class="type ' + r.type + '">' + TYPE_LABEL[r.type] + '</span></td>' +
      '<td>' + (r.type === 'A' || r.type === 'D' ? '<span style="color:var(--ink-3);font-size:10.5px">—</span>' :
        '<select onchange="updateRaid(' + realIdx + ',\'sev\',this.value)"><option value="high" ' + (r.sev==='high'?'selected':'') + '>HIGH</option><option value="med" ' + (r.sev==='med'?'selected':'') + '>MED</option><option value="low" ' + (r.sev==='low'?'selected':'') + '>LOW</option></select>') +
      '</td>' +
      '<td class="desc" contenteditable="true" onblur="updateRaid(' + realIdx + ',\'desc\',this.innerHTML)">' + r.desc + '</td>' +
      '<td><span class="owner" contenteditable="true" onblur="updateRaid(' + realIdx + ',\'owner\',this.textContent)">' + r.owner + '</span></td>' +
      '<td><select onchange="updateRaid(' + realIdx + ',\'status\',this.value)">' +
        ['Open','In Progress','Mitigated','Confirmed','Pending','Active','Closed'].map(s => '<option' + (r.status===s?' selected':'') + '>' + s + '</option>').join('') +
      '</select></td>' +
      '<td><button class="delete-btn" onclick="deleteRaid(' + realIdx + ')" title="Delete">×</button></td>' +
    '</tr>';
  });
  html += '</tbody></table>';
  html += '<div class="pg-raid-add"><span style="font-size:11px;color:var(--ink-2);align-self:center;margin-right:6px">Add new:</span>' +
    '<button onclick="addRaidRow(\'R\')">+ Risk</button>' +
    '<button onclick="addRaidRow(\'A\')">+ Assumption</button>' +
    '<button onclick="addRaidRow(\'I\')">+ Issue</button>' +
    '<button onclick="addRaidRow(\'D\')">+ Dependency</button>' +
  '</div></div>';
  return html;
}
function updateRaid(idx, key, val) { if (STATE.raid[idx]) { STATE.raid[idx][key] = val; saveState(); renderHero(); } }
function addRaidRow(type) {
  const next = STATE.raid.length + 1;
  STATE.raid.push({ id:'P-' + String(next).padStart(3,'0'), type:type, sev: type === 'R' || type === 'I' ? 'med' : '', desc:'Click to describe…', owner:'TBD', status:'Open', createdAt:new Date().toISOString() });
  STATE.runlog.unshift({ time:new Date().toISOString(), ic:'➕', msg:'Added new ' + TYPE_LABEL[type].toLowerCase() + ' P-' + String(next).padStart(3,'0') + '.' });
  saveState();
  renderBody();
  renderHero();
}
function deleteRaid(idx) {
  const r = STATE.raid[idx];
  if (!r) return;
  if (!confirm('Delete ' + r.id + ' (' + TYPE_LABEL[r.type] + ')?')) return;
  STATE.raid.splice(idx, 1);
  STATE.runlog.unshift({ time:new Date().toISOString(), ic:'🗑', msg:'Deleted ' + r.id + ' (' + TYPE_LABEL[r.type].toLowerCase() + ').' });
  saveState();
  renderBody();
  renderHero();
}

/* ── 7-R Gantt ──────────────────────────────────────── */
function renderGantt() {
  // Assign each capability to a wave + start month based on verdict
  const VERDICT_WAVE = { REHOST:1, REPLAT:2, REFACT:2, REARCH:3, REBUILD:3, REPLACE:1, RETAIN:0 };
  const WAVE_START = { 1:2, 2:5, 3:8, 0:14 };  // month start
  const VERDICT_DUR = { REHOST:2.5, REPLAT:5, REFACT:7.5, REARCH:10.5, REBUILD:12, REPLACE:7, RETAIN:0 };

  // Months 1..18
  let head = '<div class="pg-gantt-head"><div class="name">CAPABILITY</div><div class="months">';
  for (let i = 1; i <= 18; i++) head += '<div>M' + i + '</div>';
  head += '</div></div>';

  let rows = '';
  STATE.capabilities.forEach(c => {
    const v   = c.verdict || 'REPLAT';
    const start = WAVE_START[VERDICT_WAVE[v]] || 1;
    const dur   = VERDICT_DUR[v] || 5;
    const left = ((start - 1) / 18) * 100;
    const widthPct = (dur / 18) * 100;
    rows += '<div class="pg-gantt-row">' +
      '<div class="name"><div class="cap-name">' + c.name + '</div><div class="cap-meta">Wave ' + (VERDICT_WAVE[v]||'-') + ' · ' + v + ' · ' + (c.chosenCloud || c.stack || '?') + '</div></div>' +
      '<div class="pg-gantt-bar-track">';
    for (let i = 0; i < 18; i++) rows += '<div class="col"></div>';
    rows += '<div class="pg-gantt-bar ' + v + '" style="left:' + left + '%;width:' + widthPct + '%">' + v + '</div>' +
      '</div></div>';
  });

  // Milestone markers
  let milestones = '<div style="margin-top:14px;font-size:11.5px;color:var(--ink-2);background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 14px">' +
    '<strong style="color:var(--ink)">Milestones:</strong> ' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M1 · Architecture sign-off (Month 2)</span>' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M2 · Landing zone (Month 4)</span>' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M3 · Cards wave (Month 7)</span>' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M4 · Core wave (Month 10)</span>' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M5 · Risk wave (Month 12)</span>' +
    '<span style="margin:0 8px"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:50%;margin-right:5px"></span>M6 · Final cutover (Month 14)</span>' +
  '</div>';

  return '<div class="pg-gantt"><div class="pg-gantt-wrap">' + head + rows + '</div></div>' + milestones;
}

/* ── Cost model ─────────────────────────────────────── */
function renderCost() {
  const caps = STATE.capabilities;
  let monthlyFut = 0, monthlyLeg = 0;
  caps.forEach(c => { monthlyFut += (c.monthly || 0); });
  const legacy = window.DI && window.DI.pricing ? window.DI.pricing.legacyTco(caps) : [];
  legacy.forEach(l => { monthlyLeg += l.monthly; });
  const tco3yrFut = monthlyFut * 36;
  const tco3yrLeg = monthlyLeg * 36;
  const savings   = tco3yrLeg - tco3yrFut;
  const programCost = STATE.fixedPrice;

  let html = '<div class="pg-cost-grid">' +
    '<div class="pg-cost-card"><div class="lbl">PROGRAM COST · ONE-TIME</div><div class="val gold">' + fmt(programCost) + '</div><div class="sub">Fixed price for vendor services per SOW</div></div>' +
    '<div class="pg-cost-card"><div class="lbl">CLOUD INFRA · 3-YR</div><div class="val">' + fmt(tco3yrFut) + '</div><div class="sub">Billed by hyperscalers, reimbursed at cost</div></div>' +
    '<div class="pg-cost-card"><div class="lbl">3-YR SAVINGS</div><div class="val green">' + fmt(savings) + '</div><div class="sub">vs legacy ' + fmt(tco3yrLeg) + '</div></div>' +
  '</div>';

  // Per-capability cost breakdown
  html += '<div class="pg-raid"><table><thead><tr><th>CAPABILITY</th><th>7R</th><th>CLOUD</th><th style="text-align:right">MONTHLY</th><th style="text-align:right">3-YR TCO</th><th style="text-align:right">% OF TOTAL</th></tr></thead><tbody>';
  caps.forEach(c => {
    const pct = monthlyFut ? Math.round((c.monthly / monthlyFut) * 100) : 0;
    html += '<tr><td><strong>' + c.name + '</strong></td><td><span class="type" style="background:var(--aglow);color:var(--gold)">' + (c.verdict || '?') + '</span></td><td>' + (c.chosenCloud || c.stack || '?') + '</td>' +
      '<td style="text-align:right;font-family:var(--f-mono)">' + fmt(c.monthly || 0) + '</td>' +
      '<td style="text-align:right;font-family:var(--f-mono)">' + fmt((c.monthly||0) * 36) + '</td>' +
      '<td style="text-align:right;font-family:var(--f-mono);color:var(--gold);font-weight:700">' + pct + '%</td></tr>';
  });
  html += '<tr style="background:var(--aglow);font-weight:700"><td colspan="3">TOTAL</td>' +
    '<td style="text-align:right;font-family:var(--f-mono)">' + fmt(monthlyFut) + '</td>' +
    '<td style="text-align:right;font-family:var(--f-mono)">' + fmt(tco3yrFut) + '</td><td></td></tr>' +
  '</tbody></table></div>';

  return html;
}

/* ── Runlog ─────────────────────────────────────────── */
function renderRunlog() {
  if (!STATE.runlog.length) return '<div class="pg-runlog"><p style="color:var(--ink-2);font-size:12px">No events yet. Activity will be logged as you edit RAID items, change cost models, or receive new handoffs.</p></div>';
  return '<div class="pg-runlog">' + STATE.runlog.map(e =>
    '<div class="pg-runlog-entry">' +
      '<div class="time">' + new Date(e.time).toLocaleString() + '</div>' +
      '<div class="ic">' + e.ic + '</div>' +
      '<div class="msg">' + e.msg + '</div>' +
    '</div>'
  ).join('') + '</div>';
}

/* ── Sample loader (if no handoff) ──────────────────── */
function loadSample() {

    INPUT = {
      source: 'sample',
      capabilities: [
        { id:'core-payments', name:'Core Banking · Payments', verdict:'REARCH', chosenCloud:'AWS',   monthly:18260 },

        { id:'card-mgmt',     name:'Cards · Management',      verdict:'REFACT', chosenCloud:'AWS',   monthly:9550  },
        { id:'card-tx',       name:'Cards · Transactions',    verdict:'REFACT', chosenCloud:'AWS',   monthly:11800 },
        { id:'trade-finance', name:'Trade Finance',           verdict:'REFACT', chosenCloud:'AWS',   monthly:7680  },
        { id:'treasury',      name:'Treasury',                verdict:'REPLAT', chosenCloud:'OCI',   monthly:7200  },

}

/* ── Exports ────────────────────────────────────────── */
function exportRAID() {
  const csv = 'ID,Type,Severity,Description,Owner,Status\n' +
    STATE.raid.map(r => [r.id, TYPE_LABEL[r.type], r.sev, '"' + r.desc.replace(/<[^>]+>/g,'').replace(/"/g,'""') + '"', r.owner, r.status].join(',')).join('\n');
  downloadBlob(csv, 'text/csv', 'raid-register-' + new Date().toISOString().slice(0,10) + '.csv');
}
function exportGanttCSV() {
  const VERDICT_DUR = { REHOST:2.5, REPLAT:5, REFACT:7.5, REARCH:10.5, REBUILD:12, REPLACE:7, RETAIN:0 };
  const VERDICT_WAVE = { REHOST:1, REPLAT:2, REFACT:2, REARCH:3, REBUILD:3, REPLACE:1, RETAIN:0 };
  const WAVE_START = { 1:2, 2:5, 3:8, 0:14 };
  const csv = 'Capability,Verdict,Wave,Start Month,Duration Months,Target Cloud,Monthly Cost\n' +
    STATE.capabilities.map(c => {
      const v = c.verdict || 'REPLAT';
      const wave = VERDICT_WAVE[v] || 0;
      return [c.name, v, wave, WAVE_START[wave] || 1, VERDICT_DUR[v] || 5, c.chosenCloud || c.stack || '?', c.monthly || 0].join(',');
    }).join('\n');
  downloadBlob(csv, 'text/csv', 'gantt-' + new Date().toISOString().slice(0,10) + '.csv');
}
function exportCostCSV() {
  let monthlyFut = 0;
  STATE.capabilities.forEach(c => { monthlyFut += (c.monthly || 0); });
  const csv = 'Capability,Verdict,Cloud,Monthly USD,3-Yr TCO USD\n' +
    STATE.capabilities.map(c => [c.name, c.verdict||'?', c.chosenCloud||c.stack||'?', c.monthly||0, (c.monthly||0)*36].join(',')).join('\n') +
    '\nTOTAL,,,' + monthlyFut + ',' + (monthlyFut*36);
  downloadBlob(csv, 'text/csv', 'cost-breakdown-' + new Date().toISOString().slice(0,10) + '.csv');
}
function exportRunlog() {
  const txt = STATE.runlog.map(e => '[' + new Date(e.time).toISOString() + '] ' + e.msg.replace(/<[^>]+>/g,'')).join('\n');
  downloadBlob(txt, 'text/plain', 'runlog-' + new Date().toISOString().slice(0,10) + '.txt');
}

function exportMSProject() {
  // Generate Microsoft Project XML (.xml that MS Project can import)
  const VERDICT_WAVE = { REHOST:1, REPLAT:2, REFACT:2, REARCH:3, REBUILD:3, REPLACE:1, RETAIN:0 };
  const WAVE_START   = { 1:2, 2:5, 3:8, 0:14 };
  const VERDICT_DUR  = { REHOST:2.5, REPLAT:5, REFACT:7.5, REARCH:10.5, REBUILD:12, REPLACE:7, RETAIN:0 };
  const startDate = new Date(); startDate.setHours(0,0,0,0);
  function dateAdd(d, months) { const x = new Date(d); x.setMonth(x.getMonth() + Math.round(months)); return x; }
  function iso(d) { return d.toISOString().slice(0,10) + 'T00:00:00'; }

  let tasks = '';
  let uid = 0;
  // Top-level program
  uid++;
  tasks += '<Task><UID>' + uid + '</UID><ID>' + uid + '</ID><Name>Banking Modernization Program</Name><Type>1</Type><OutlineLevel>1</OutlineLevel><Start>' + iso(startDate) + '</Start><Finish>' + iso(dateAdd(startDate, STATE.durationMonths)) + '</Finish><Summary>1</Summary></Task>';

  // Per capability
  STATE.capabilities.forEach((c, i) => {
    uid++;
    const v = c.verdict || 'REPLAT';
    const wave = VERDICT_WAVE[v] || 1;
    const startMo = WAVE_START[wave] || 1;
    const dur = VERDICT_DUR[v] || 5;
    const taskStart = dateAdd(startDate, startMo - 1);
    const taskEnd   = dateAdd(taskStart, dur);
    tasks += '<Task>' +
      '<UID>' + uid + '</UID>' +
      '<ID>' + uid + '</ID>' +
      '<Name>' + xmlEscape(c.name) + ' · ' + v + '</Name>' +
      '<Type>0</Type>' +
      '<OutlineLevel>2</OutlineLevel>' +
      '<Start>' + iso(taskStart) + '</Start>' +
      '<Finish>' + iso(taskEnd) + '</Finish>' +
      '<Duration>PT' + Math.round(dur * 4 * 40) + 'H0M0S</Duration>' +   // ~40h/wk
      '<Notes>' + xmlEscape((c.chosenCloud||c.stack||'?') + ' · ' + (c.eff||'?') + ' · ' + (c.risk||'?') + ' risk') + '</Notes>' +
    '</Task>';
  });

  const xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
    '<Project xmlns="http://schemas.microsoft.com/project">' +
      '<Name>Banking Modernization · ' + STATE.capabilities.length + ' capabilities</Name>' +
      '<Title>Banking Modernization Program</Title>' +
      '<Author>Digital Infotech</Author>' +
      '<CreationDate>' + iso(new Date()) + '</CreationDate>' +
      '<ScheduleFromStart>1</ScheduleFromStart>' +
      '<StartDate>' + iso(startDate) + '</StartDate>' +
      '<Tasks>' + tasks + '</Tasks>' +
    '</Project>';

  downloadBlob(xml, 'application/xml', 'banking-mod-program-' + new Date().toISOString().slice(0,10) + '.xml');
  STATE.runlog.unshift({ time:new Date().toISOString(), ic:'⬇', msg:'Exported MS Project XML · <strong>' + STATE.capabilities.length + ' tasks</strong> · imports cleanly into Microsoft Project / Project Online.' });
  saveState();
  if (STATE.tab === 'runlog') renderBody();
}

function xmlEscape(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

function downloadBlob(content, mime, filename) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 100);
  window.DI && window.DI.toast && window.DI.toast({ kind:'ok', icon:'⬇', title:'Downloaded', message: filename });
}

/* ── Bootstrap ──────────────────────────────────────── */
loadInput();
const seeded = consumeHandoff();
renderHero();
renderTabs();
renderToolbar();
renderBody();

if (seeded) {
  setTimeout(() => {
    window.DI && window.DI.toast && window.DI.toast({ kind:'ok', icon:'📥', title:'Architecture handoff received', message:'Imported ' + STATE.capabilities.length + ' capabilities; seeded ' + STATE.raid.length + ' RAID items.', duration:4500 });
  }, 800);
}
