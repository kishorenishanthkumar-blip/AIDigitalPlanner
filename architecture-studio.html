<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Architecture Studio · DI Platform</title>
<meta name="description" content="Architecture Studio — finalize cloud targets with live pricing across AWS, Azure, GCP, OCI, IBM and Private DC."/>
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/toasts.js" defer></script>
<script src="assets/top-bar.js" defer></script>
<script src="assets/pricing.js" defer></script>
<script src="assets/nishi-dock.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas-2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;overflow-x:hidden;min-height:100vh}
a{color:var(--gold);text-decoration:none}
button{font-family:var(--f-ui);cursor:pointer;border:none}

/* Filters bar */
.as-filters{background:#fff;border-bottom:1px solid var(--border);padding:13px 24px}
.as-filters-wrap{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.as-filt{display:flex;flex-direction:column;gap:3px}
.as-filt .lbl{font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase}
.as-filt select,.as-filt input{padding:6px 10px;border:1px solid var(--border-2);border-radius:7px;font-size:12px;background:var(--canvas);font-family:inherit;outline:none;color:var(--ink)}
.as-filt select:focus,.as-filt input:focus{border-color:var(--gold)}
.as-chips{display:flex;gap:4px;flex-wrap:wrap}
.as-chip{font-size:10.5px;background:var(--aglow);border:1px solid var(--gold-2);border-radius:99px;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.as-chip.off{background:var(--canvas);border-color:var(--border);color:var(--ink-2)}
.as-chip input{accent-color:var(--gold);margin:0}
.as-refresh{margin-left:auto;font-size:10.5px;color:var(--ink-2);text-align:right;line-height:1.45}
.as-refresh strong{color:var(--green)}

/* Hero */
.as-hero{padding:24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff,var(--canvas))}
.as-hero-wrap{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px}
.as-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.as-h1{font-family:var(--f-head);font-size:24px;font-weight:600;line-height:1.18}
.as-h1 em{font-style:italic;color:var(--gold)}
.as-stats{display:flex;gap:10px;flex-wrap:wrap}
.as-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 14px;min-width:140px;text-align:center}
.as-stat.ok  {background:var(--green-bg);border-color:var(--green)}
.as-stat.warn{background:var(--aglow);border-color:var(--gold)}
.as-stat .lbl{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--ink-2);text-transform:uppercase;margin-bottom:2px}
.as-stat .val{font-family:var(--f-head);font-size:20px;font-weight:600;color:var(--ink)}
.as-stat.ok   .val{color:#0A8462}
.as-stat.warn .val{color:var(--gold)}
.as-stat .sub{font-size:9.5px;color:var(--ink-2);margin-top:1px}
.as-stat.ok .sub{color:#0A8462;font-weight:700}

/* Main content */
.as-main{padding:18px 24px 36px;max-width:1400px;margin:0 auto}

/* Banner */
.as-banner{background:#FFFCF4;border:1px solid var(--gold-2);border-radius:10px;padding:11px 14px;font-size:12px;color:#7A5F10;margin-bottom:14px;display:flex;align-items:center;gap:10px;line-height:1.55}
.as-banner strong{color:var(--gold)}
.as-banner .right{margin-left:auto;display:flex;gap:6px}
.as-banner button{background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:inherit}

/* Pricing grid table */
.as-grid{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:auto;-webkit-overflow-scrolling:touch}
.as-grid table{border-collapse:collapse;font-size:12px;min-width:1100px;width:100%}
.as-grid thead th{background:var(--canvas);font-size:9.5px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5}
.as-grid thead th.cloud{text-align:center;border-left:1px solid var(--border)}
.as-grid thead th.cloud.chosen{background:var(--aglow);color:var(--gold)}
.as-grid td{padding:11px 12px;border-bottom:1px solid var(--canvas-2);vertical-align:top}
.as-grid tr:hover td{background:var(--canvas)}
.as-cap-name{font-weight:700;font-size:12.5px}
.as-cap-stack{font-size:10.5px;color:var(--ink-2);margin-top:2px}
.as-verdict{display:inline-block;padding:3px 8px;border-radius:99px;color:#fff;font-size:9px;font-weight:700;letter-spacing:.04em}
.as-cell{text-align:right;font-family:var(--f-mono);font-size:12px;border-left:1px solid var(--canvas-2);padding:8px 10px}
.as-cell.chosen{background:var(--aglow);font-weight:700;color:var(--gold)}
.as-cell .mo{display:block;font-size:11px}
.as-cell .yr{display:block;font-size:9.5px;color:var(--ink-2);margin-top:1px}
.as-cell .yr.chosen{color:var(--gold)}
.as-cell .pick{display:block;font-size:9px;color:var(--ink-3);margin-top:3px;cursor:pointer;font-family:var(--f-ui)}
.as-cell .pick:hover{color:var(--gold);text-decoration:underline}
.as-cell.chosen .pick{color:var(--gold);font-weight:700}
.as-cell.chosen .pick::before{content:'✓ chosen';color:#0A8462;font-weight:700}
.as-cell.chosen .pick > .pick-text{display:none}
.as-grid tfoot td{background:var(--aglow);font-weight:700;font-size:13px;color:var(--ink);border-bottom:none}
.as-grid tfoot td.total{font-family:var(--f-mono)}

/* Sources strip */
.as-sources{background:#FFFCF4;border:1px dashed var(--gold-2);border-radius:11px;padding:12px 16px;font-size:11.5px;color:#7A5F10;line-height:1.55;margin-top:14px}
.as-sources strong{color:var(--gold)}
.as-sources .pill{display:inline-block;background:#fff;border:1px solid var(--gold-2);border-radius:6px;padding:2px 8px;margin:3px 4px 0 0;font-size:11px;color:var(--ink)}
.as-sources .pill a{color:var(--gold)}
.as-sources .note{margin-top:8px;font-size:10.5px;color:#9C7C20}

/* CTA strip */
.as-cta{margin-top:18px;background:var(--ink);color:#fff;border-radius:12px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
.as-cta .lbl{font-size:10px;font-weight:700;color:var(--gold-3);letter-spacing:.1em;text-transform:uppercase}
.as-cta .h{font-size:14px;font-weight:600;margin-top:2px}
.as-cta .sub{font-size:11.5px;color:#8AA4C8;margin-top:3px}
.as-cta .actions{display:flex;gap:8px;flex-wrap:wrap}
.as-cta .primary{background:var(--gold);border:none;color:#fff;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.as-cta .ghost{background:transparent;border:1px solid #243655;color:var(--gold-3);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* Empty state */
.as-empty{text-align:center;padding:60px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;color:var(--ink-2)}
.as-empty h2{font-family:var(--f-head);font-size:20px;color:var(--ink);margin-bottom:8px}
.as-empty p{font-size:13px;max-width:480px;margin:0 auto 14px;line-height:1.55}
.as-empty .actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.as-empty .actions a,.as-empty .actions button{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:700;text-decoration:none;font-family:inherit;cursor:pointer}
.as-empty .actions .ghost{background:#fff;color:var(--ink);border:1px solid var(--border)}

/* Provenance modal */
.as-modal-bg{position:fixed;inset:0;background:rgba(20,33,58,.4);display:none;align-items:center;justify-content:center;z-index:99980}
.as-modal-bg.open{display:flex}
.as-modal{background:#fff;border-radius:14px;max-width:520px;width:90vw;padding:22px;box-shadow:var(--shadow-lg);font-family:var(--f-ui)}
.as-modal h3{font-family:var(--f-head);font-size:18px;color:var(--ink);margin-bottom:10px}
.as-modal .row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed var(--border)}
.as-modal .row span{color:var(--ink-2)}
.as-modal .row strong{color:var(--ink);font-family:var(--f-mono)}
.as-modal .close{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;margin-top:14px;cursor:pointer}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .35s ease both}
</style>
</head>
<body>

<div data-di-topbar></div>

<!-- Filters -->
<div class="as-filters">
  <div class="as-filters-wrap">
    <div class="as-filt"><div class="lbl">REGION</div><select id="f-region"></select></div>
    <div class="as-filt"><div class="lbl">PRICING MODEL</div><select id="f-model"></select></div>
    <div class="as-filt"><div class="lbl">CURRENCY</div><select id="f-currency"></select></div>
    <div class="as-filt"><div class="lbl">DISCOUNT</div><input id="f-discount" type="number" min="0" max="60" step="1" value="0" style="width:74px">%</div>
    <div class="as-filt">
      <div class="lbl">INCLUDE</div>
      <div class="as-chips">
        <label class="as-chip"><input type="checkbox" id="c-compute" checked>Compute</label>
        <label class="as-chip"><input type="checkbox" id="c-storage" checked>Storage</label>
        <label class="as-chip"><input type="checkbox" id="c-egress"  checked>Egress</label>
        <label class="as-chip off"><input type="checkbox" id="c-support">Support</label>
      </div>
    </div>
    <div class="as-refresh" id="refresh-info"></div>
  </div>
</div>

<!-- Hero -->
<section class="as-hero" id="as-hero"></section>

<!-- Main content -->
<main class="as-main" id="as-main"></main>

<!-- Provenance modal -->
<div class="as-modal-bg" id="as-modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="as-modal" id="as-modal-body"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   Architecture Studio · Phase 15b
   Reads Discovery 7R handoff from localStorage, renders
   6-cloud pricing grid, allows per-capability cloud picks.
═══════════════════════════════════════════════════════ */

/* ── State ──────────────────────────────────────────── */
const ARCH_KEY = 'di_architecture_v1';
let STATE = {
  region: 'na-east',
  model: '3-yr-savings',
  currency: 'USD',
  discount: 0,
  include: { compute: true, storage: true, egress: true, support: false },
  picks: {},        // capabilityId → chosen cloud
  capabilities: [], // [{ id, name, verdict, ... }]
  source: null      // 'discovery' or 'manual'
};

const CLOUDS = ['AWS','AZURE','GCP','OCI','IBM','PRIVATE-DC'];
const CLOUD_LABEL = { AWS:'AWS', AZURE:'Azure', GCP:'GCP', OCI:'OCI', IBM:'IBM', 'PRIVATE-DC':'Private DC' };
const CLOUD_BADGE_COLOR = { AWS:'#FF9900', AZURE:'#0078D4', GCP:'#0F9D58', OCI:'#F80000', IBM:'#1F70C1', 'PRIVATE-DC':'#5B6B8A' };

const VERDICT_META = {
  REHOST:   { name:'Rehost',     color:'#3D8EFF' },
  REPLAT:   { name:'Replatform', color:'#0FD49A' },
  REFACT:   { name:'Refactor',   color:'#FF8030' },
  REARCH:   { name:'Rearchitect',color:'#FF4D6A' },
  REBUILD:  { name:'Rebuild',    color:'#9B72FF' },
  REPLACE:  { name:'Replace',    color:'#A0357A' },
  RETAIN:   { name:'Retain',     color:'#5B6B8A' }
};

const REGION_LABEL = {
  'na-east':'NA · us-east-1 / eastus / us-east1',
  'na-west':'NA · us-west-2 / westus2 / us-west1',
  'eu-west':'EU · eu-west-1 / westeurope / europe-west1',
  'eu-central':'EU · eu-central-1 / germanywestcentral / europe-west3',
  'apac-singapore':'APAC · ap-southeast-1 / southeastasia',
  'apac-mumbai':'APAC · ap-south-1 / centralindia',
  'apac-sydney':'APAC · ap-southeast-2 / australiaeast',
  'sea-jakarta':'SEA · ap-southeast-3',
  'swa-dubai':'SWA · me-central-1 / uaenorth'
};
const MODEL_LABEL = {
  'on-demand':'On-demand',
  '1-yr-reserved':'1-year reserved',
  '3-yr-savings':'3-year Savings Plan',
  'spot':'Spot / preemptible'
};

/* ── State persistence ──────────────────────────────── */
function saveState() { try { localStorage.setItem(ARCH_KEY, JSON.stringify(STATE)); } catch(e){} }
function loadState() {
  try { const raw = localStorage.getItem(ARCH_KEY); if (raw) STATE = Object.assign(STATE, JSON.parse(raw)); }
  catch(e) {}
}

/* ── Discovery handoff ──────────────────────────────── */
function consumeHandoff() {
  try {
    const raw = localStorage.getItem('di_handoff_architecture');
    if (!raw) return false;
    const h = JSON.parse(raw);
    if (h && h.capabilities && h.capabilities.length) {
      STATE.capabilities = h.capabilities;
      // Initialize picks from recommended verdict's natural stack
      h.capabilities.forEach(c => {
        if (!STATE.picks[c.id]) {
          const stackMap = { AWS:'AWS', AZURE:'AZURE', GCP:'GCP', OCI:'OCI', IBM:'IBM', 'SaaS':'AWS', 'PRIVATE-DC':'PRIVATE-DC' };
          STATE.picks[c.id] = stackMap[c.stack] || 'AWS';
        }
      });
      STATE.source = 'discovery';
      // Optional: clear the handoff so we don't re-import on every visit
      // localStorage.removeItem('di_handoff_architecture');
      saveState();
      return true;
    }
  } catch (e) {}
  return false;
}

/* ── Filter wiring ──────────────────────────────────── */
function initFilters() {
  const reg = document.getElementById('f-region');
  reg.innerHTML = Object.keys(REGION_LABEL).map(k => '<option value="' + k + '"' + (STATE.region === k ? ' selected' : '') + '>' + REGION_LABEL[k] + '</option>').join('');
  reg.addEventListener('change', e => { STATE.region = e.target.value; saveState(); render(); });

  const mod = document.getElementById('f-model');
  mod.innerHTML = Object.keys(MODEL_LABEL).map(k => '<option value="' + k + '"' + (STATE.model === k ? ' selected' : '') + '>' + MODEL_LABEL[k] + '</option>').join('');
  mod.addEventListener('change', e => { STATE.model = e.target.value; saveState(); render(); });

  const cur = document.getElementById('f-currency');
  cur.innerHTML = window.DI.pricing.currencies.map(k => '<option value="' + k + '"' + (STATE.currency === k ? ' selected' : '') + '>' + k + '</option>').join('');
  cur.addEventListener('change', e => { STATE.currency = e.target.value; saveState(); render(); });

  const disc = document.getElementById('f-discount');
  disc.value = STATE.discount;
  disc.addEventListener('input', e => { STATE.discount = +e.target.value; saveState(); render(); });

  ['compute','storage','egress','support'].forEach(k => {
    const el = document.getElementById('c-' + k);
    el.checked = !!STATE.include[k];
    el.addEventListener('change', e => {
      STATE.include[k] = e.target.checked;
      const chip = e.target.parentNode;
      chip.classList.toggle('off', !e.target.checked);
      saveState();
      render();
    });
    // initialize chip class
    if (!STATE.include[k]) el.parentNode.classList.add('off');
  });

  document.getElementById('refresh-info').innerHTML =
    'Last refresh: <strong>●</strong> ' + new Date(window.DI.pricing.refreshedAt).toLocaleDateString() + '<br>' +
    'AWS · Azure · GCP · OCI · IBM ' + (window.DI.pricing.isLive ? '· LIVE' : '· cached snapshot');
}

/* ── Currency formatter ─────────────────────────────── */
function fmtMoney(n) {
  if (!isFinite(n)) return '—';
  const c = STATE.currency || 'USD';
  if (n >= 1000000) return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:1 }).format(n/1000000).replace(/\.0$/,'') + 'M';
  if (n >= 10000)   return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:0 }).format(n);
  return new Intl.NumberFormat(undefined, { style:'currency', currency:c, maximumFractionDigits:0 }).format(n);
}

/* ── Render hero ────────────────────────────────────── */
function renderHero() {
  const caps = STATE.capabilities;
  const includeComponents = Object.keys(STATE.include).filter(k => STATE.include[k]);
  let totalMonthly = 0, totalLegacy = 0;
  if (caps.length) {
    const fut  = window.DI.pricing.compute3Yr(caps, { region:STATE.region, model:STATE.model, currency:STATE.currency, discount:STATE.discount, components:includeComponents });
    const leg  = window.DI.pricing.legacyTco(caps);
    fut.forEach((f, i) => {
      // Use the user's picked cloud (override recommendation)
      const cloud = STATE.picks[f.capabilityId] || f.chosenCloud;
      totalMonthly += (f.allClouds[cloud] && f.allClouds[cloud].total) || 0;
    });
    leg.forEach(l => { totalLegacy += l.monthly; });
  }
  const tcoFut = totalMonthly * 36;
  const tcoLeg = totalLegacy * 36;
  const savings = tcoLeg - tcoFut;
  const pct = tcoLeg ? Math.round((savings / tcoLeg) * 100) : 0;

  const el = document.getElementById('as-hero');
  el.innerHTML =
    '<div class="as-hero-wrap">' +
      '<div>' +
        '<div class="as-eyebrow">ARCHITECTURE · ' + caps.length + ' CAPABILITIES · 3-YEAR TCO</div>' +
        '<h1 class="as-h1">Live cloud pricing applied to your 7R plan, <em>updated daily.</em></h1>' +
      '</div>' +
      '<div class="as-stats">' +
        '<div class="as-stat"><div class="lbl">LEGACY TCO</div><div class="val">' + fmtMoney(tcoLeg) + '</div><div class="sub">3-yr · current state</div></div>' +
        '<div class="as-stat warn"><div class="lbl">FUTURE (CLOUD) TCO</div><div class="val">' + fmtMoney(tcoFut) + '</div><div class="sub">3-yr · all-in</div></div>' +
        '<div class="as-stat ok"><div class="lbl">3-YEAR SAVINGS</div><div class="val">' + (savings >= 0 ? fmtMoney(savings) : '—') + '</div><div class="sub">↓ ' + pct + '%</div></div>' +
      '</div>' +
    '</div>';
}

/* ── Render main (table or empty state) ─────────────── */
function render() {
  renderHero();
  const main = document.getElementById('as-main');
  const caps = STATE.capabilities;

  if (!caps.length) {
    main.innerHTML =
      '<div class="as-empty fadeUp">' +
        '<h2>No capabilities loaded yet</h2>' +
        '<p>Architecture Studio works best when it receives a 7R map from Discovery Studio. Go to Discovery, pick your capabilities, then click <strong>Send to Architecture</strong> at the end of the wizard.</p>' +
        '<div class="actions">' +
          '<a href="discovery-studio.html">Open Discovery Studio →</a>' +
          '<button class="ghost" onclick="loadSampleCaps()">Load sample (13 capabilities)</button>' +
        '</div>' +
      '</div>';
    return;
  }

  // Banner if source = discovery
  let banner = '';
  if (STATE.source === 'discovery') {
    banner = '<div class="as-banner">📥 <div>Imported <strong>' + caps.length + ' capabilities</strong> from Discovery Studio. Each capability\'s 7R verdict and target cloud are pre-loaded; you can override any pick below.</div>' +
      '<div class="right"><button onclick="goBackToDiscovery()">↻ Re-run Discovery</button></div></div>';
  }

  // Compute prices per capability per cloud
  const includeComponents = Object.keys(STATE.include).filter(k => STATE.include[k]);
  const rows = caps.map(cap => {
    const all = window.DI.pricing.estimate({ capabilityId: cap.id, verdict: cap.verdict }, {
      region: STATE.region, model: STATE.model, currency: STATE.currency, discount: STATE.discount, components: includeComponents
    });
    return { cap, all };
  });

  // Totals per cloud (monthly)
  const totals = {};
  CLOUDS.forEach(c => totals[c] = 0);
  let pickedTotal = 0;
  rows.forEach(r => {
    CLOUDS.forEach(c => { totals[c] += r.all[c].total; });
    const picked = STATE.picks[r.cap.id] || 'AWS';
    pickedTotal += r.all[picked].total;
  });

  // Build table
  let html = banner + '<div class="as-grid fadeUp"><table>';
  html += '<thead><tr>' +
    '<th>Capability</th><th>7R</th>' +
    CLOUDS.map(c => '<th class="cloud" data-cloud="' + c + '">' + CLOUD_LABEL[c] + '<br><span style="font-weight:400;font-size:9px;color:' + CLOUD_BADGE_COLOR[c] + '">●</span></th>').join('') +
  '</tr></thead><tbody>';
  rows.forEach(r => {
    const picked = STATE.picks[r.cap.id] || 'AWS';
    html += '<tr>';
    html += '<td><div class="as-cap-name">' + r.cap.name + '</div><div class="as-cap-stack">' + (r.cap.current || '') + ' → ' + (r.cap.future || '') + '</div></td>';
    const v = VERDICT_META[r.cap.verdict] || VERDICT_META.RETAIN;
    html += '<td><span class="as-verdict" style="background:' + v.color + '">' + v.name.toUpperCase() + '</span></td>';
    CLOUDS.forEach(c => {
      const cell = r.all[c];
      const isChosen = c === picked;
      html += '<td class="as-cell ' + (isChosen ? 'chosen' : '') + '" data-cap="' + r.cap.id + '" data-cloud="' + c + '">' +
        '<span class="mo">' + fmtMoney(cell.total) + '</span>' +
        '<span class="yr ' + (isChosen ? 'chosen' : '') + '">3y · ' + fmtMoney(cell.tco3yr) + '</span>' +
        '<span class="pick" onclick="pickCloud(\'' + r.cap.id + '\',\'' + c + '\')"><span class="pick-text">pick</span></span>' +
        '<span class="pick" style="margin-top:0" onclick="event.stopPropagation();showProvenance(\'' + r.cap.id + '\',\'' + c + '\')" title="Source of this number">⋯ source</span>' +
      '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  // Totals row
  html += '<tfoot><tr>' +
    '<td colspan="2">TOTAL · ' + caps.length + ' capabilities · monthly</td>' +
    CLOUDS.map(c => {
      const cls = totals[c] === Math.min.apply(null, CLOUDS.map(k => totals[k])) ? 'chosen' : '';
      return '<td class="as-cell total ' + cls + '"><span class="mo">' + fmtMoney(totals[c]) + '</span><span class="yr">3y · ' + fmtMoney(totals[c]*36) + '</span></td>';
    }).join('') +
  '</tr></tfoot>';
  html += '</table></div>';

  // Sources strip
  html += '<div class="as-sources">' +
    '<strong>📡 Pricing sources (auto-refreshed):</strong>' +
    window.DI.pricing.sources.map(s => '<span class="pill">' + s.cloud + ' · <a href="' + s.url + '" target="_blank">' + s.label + '</a></span>').join('') +
    '<div class="note">⚠ Prices shown are public list prices snapshotted ' + new Date(window.DI.pricing.refreshedAt).toLocaleDateString() + '. Your enterprise rate may be 15-30% lower — adjust the discount field above to apply your contracted rate.</div>' +
  '</div>';

  // CTA strip
  html += '<div class="as-cta fadeUp">' +
    '<div><div class="lbl">ARCHITECTURE FINALIZED</div>' +
      '<div class="h">Picked cloud per capability · ' + fmtMoney(pickedTotal) + '/mo · ' + fmtMoney(pickedTotal*36) + ' over 3 years.</div>' +
      '<div class="sub">Send to Governance to seed the RAID + cost model + timeline, or generate the EVP summary now.</div>' +
    '</div>' +
    '<div class="actions">' +
      '<button class="primary" onclick="generateEvp()">Generate EVP Summary →</button>' +
      '<button class="ghost" onclick="sendToGovernance()">Send to Governance →</button>' +
      '<button class="ghost" onclick="goBackToDiscovery()">↺ Back to Discovery</button>' +
    '</div>' +
  '</div>';

  main.innerHTML = html;
}

/* ── Cell actions ───────────────────────────────────── */
function pickCloud(capId, cloud) {
  STATE.picks[capId] = cloud;
  saveState();
  render();
  window.DI && window.DI.toast && window.DI.toast({ kind:'ok', icon:'☁', title:'Pick updated', message: 'Now using ' + CLOUD_LABEL[cloud] + ' for this capability.', duration:2000 });
}

function showProvenance(capId, cloud) {
  const all = window.DI.pricing.estimate({ capabilityId: capId, verdict: (STATE.capabilities.find(c=>c.id===capId)||{}).verdict || 'REPLAT' }, {
    region: STATE.region, model: STATE.model, currency: STATE.currency, discount: STATE.discount,
    components: Object.keys(STATE.include).filter(k => STATE.include[k])
  });
  const c = all[cloud];
  const cap = STATE.capabilities.find(x => x.id === capId);
  let body = '<h3>Source · ' + (cap && cap.name) + ' · ' + CLOUD_LABEL[cloud] + '</h3>';
  ['compute','storage','egress','support'].forEach(k => {
    if (c[k] !== undefined && c['_unit_' + k]) {
      body += '<div class="row"><span>' + k.charAt(0).toUpperCase() + k.slice(1) + '</span><strong>' + fmtMoney(c[k]) + '/mo</strong></div>';
      body += '<div class="row"><span style="font-size:11px;color:var(--ink-3)">SKU: ' + c['_sku_' + k] + '</span><span style="font-size:11px;color:var(--ink-3);font-family:var(--f-mono)">' + c['_unit_' + k] + '</span></div>';
    }
  });
  body += '<div class="row" style="margin-top:6px"><span>Region adjustment</span><strong>' + REGION_LABEL[STATE.region] + '</strong></div>';
  body += '<div class="row"><span>Pricing model</span><strong>' + MODEL_LABEL[STATE.model] + '</strong></div>';
  body += '<div class="row"><span>Currency</span><strong>' + STATE.currency + '</strong></div>';
  body += '<div class="row"><span>Discount applied</span><strong>' + STATE.discount + '%</strong></div>';
  body += '<div class="row"><span>Snapshot date</span><strong>' + new Date(window.DI.pricing.refreshedAt).toLocaleDateString() + '</strong></div>';
  body += '<div class="row"><span>Total · monthly</span><strong style="color:var(--gold)">' + fmtMoney(c.total) + '</strong></div>';
  body += '<div class="row"><span>3-year TCO</span><strong style="color:var(--gold)">' + fmtMoney(c.tco3yr) + '</strong></div>';
  body += '<button class="close" onclick="closeModal()">Close</button>';
  document.getElementById('as-modal-body').innerHTML = body;
  document.getElementById('as-modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('as-modal-bg').classList.remove('open'); }

/* ── CTA actions ────────────────────────────────────── */

function goBackToDiscovery() { location.href = 'discovery-studio.html'; }

function sendToGovernance() {
  const includeComponents = Object.keys(STATE.include).filter(k => STATE.include[k]);
  const handoff = {
    source: 'architecture',
    sentAt: new Date().toISOString(),
    capabilities: STATE.capabilities.map(c => {
      const cloud = STATE.picks[c.id] || 'AWS';
      const all = window.DI.pricing.estimate({ capabilityId:c.id, verdict:c.verdict }, { region:STATE.region, model:STATE.model, currency:STATE.currency, discount:STATE.discount, components:includeComponents });
      return Object.assign({}, c, { chosenCloud: cloud, monthly: all[cloud].total, tco3yr: all[cloud].tco3yr });
    }),
    filters: { region:STATE.region, model:STATE.model, currency:STATE.currency, discount:STATE.discount }
  };
  try { localStorage.setItem('di_handoff_governance', JSON.stringify(handoff)); } catch(e){}
  window.DI && window.DI.toast && window.DI.toast({ kind:'ok', icon:'📤', title:'Sent to Program Governance', message: STATE.capabilities.length + ' capabilities + pricing handed off.', duration:3500 });
  setTimeout(() => { location.href = 'program-governance.html?from=architecture'; }, 800);
}

function generateEvp() {
  // Stash the architecture state for the EVP page to consume
  const includeComponents = Object.keys(STATE.include).filter(k => STATE.include[k]);
  const payload = {
    source: 'architecture',
    sentAt: new Date().toISOString(),
    capabilities: STATE.capabilities.map(c => {
      const cloud = STATE.picks[c.id] || 'AWS';
      const all = window.DI.pricing.estimate({ capabilityId:c.id, verdict:c.verdict }, { region:STATE.region, model:STATE.model, currency:STATE.currency, discount:STATE.discount, components:includeComponents });
      return Object.assign({}, c, { chosenCloud: cloud, monthly: all[cloud].total, tco3yr: all[cloud].tco3yr });
    }),
    filters: { region:STATE.region, model:STATE.model, currency:STATE.currency, discount:STATE.discount }
  };
  try { localStorage.setItem('di_evp_input', JSON.stringify(payload)); } catch(e){}
  window.DI && window.DI.toast && window.DI.toast({ kind:'info', icon:'📊', title:'Generating EVP summary…', message:'Opening board-ready summary.' });
  setTimeout(() => { location.href = 'evp-summary.html'; }, 600);
}

/* ── Bootstrap ──────────────────────────────────────── */
loadState();
const fromDiscovery = consumeHandoff();
initFilters();
render();

if (fromDiscovery) {
  setTimeout(() => {
    window.DI && window.DI.toast && window.DI.toast({ kind:'ok', icon:'📥', title:'Discovery handoff received', message:'Imported ' + STATE.capabilities.length + ' capabilities. Pricing applied below.', duration:4500 });
  }, 800);
}
</script>
