<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feature explainer — DI Platform</title>
<link rel="stylesheet" href="assets/theme.css">
<script src="assets/toasts.js" defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --canvas:#F8FAFD;--canvas2:#EEF2F8;
  --card:#FFFFFF;--ink:#1A2238;--ink2:#5B6B8A;--ink3:#9AA6BE;
  --border:#E2E7F1;--border2:#D9DFEB;
  --gold:#C8921A;--gold2:#E8AC38;--gold3:#FFD070;--aglow:#FFF7E6;
  --green:#0FD49A;--red:#FF4D6A;--blue:#3D8EFF;--purple:#9B72FF;--pink:#FF6BB5;
  --shadow:0 18px 38px -16px rgba(20,33,58,.18);
  --f-head:'Fraunces',Georgia,serif;--f-ui:'Outfit',system-ui,sans-serif;--f-mono:'JetBrains Mono','Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;overflow-x:hidden;min-height:100vh}
a{color:var(--gold);text-decoration:none}
button{font-family:var(--f-ui);cursor:pointer;border:none}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 24px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:24px}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold3));color:var(--ink);font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center}
.tb-name{font-size:14px;font-weight:700}
.tb-name .muted{color:var(--ink2);font-weight:400}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.tb-btn:hover{border-color:var(--gold);color:var(--gold);background:#FFFCF4}
.tb-btn.primary{background:var(--aglow);border-color:var(--gold2);color:var(--ink);font-weight:700}
.tb-btn.primary:hover{background:var(--gold3)}

/* Hero */
.exp{max-width:1100px;margin:0 auto;padding:30px 26px 40px}
.exp-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);margin-bottom:14px;cursor:pointer;text-decoration:none}
.exp-back:hover{color:var(--gold)}
.exp-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.exp-h1{font-family:var(--f-head);font-size:30px;font-weight:600;color:var(--ink);line-height:1.18}
.exp-h1 em{font-style:italic;color:var(--gold)}
.exp-sub{font-size:14px;color:var(--ink2);margin-top:10px;max-width:740px;line-height:1.6}

/* Two-col content */
.exp-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-top:28px;align-items:start}
.exp-stage{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);min-height:420px;display:flex;flex-direction:column}
.exp-stage-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.exp-stage-head .tag{display:inline-flex;align-items:center;gap:6px;background:var(--aglow);border:1px solid var(--gold2);border-radius:99px;padding:3px 10px;font-size:10.5px;font-weight:700;color:var(--gold);letter-spacing:.06em}
.exp-stage-head .ctrl{display:flex;gap:6px}
.exp-stage-head .ctrl button{background:#F8FAFD;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--ink)}
.exp-stage-head .ctrl button:hover{border-color:var(--gold);color:var(--gold)}
.exp-anim{flex:1;background:linear-gradient(180deg,#FBFCFE,#F4F6FA);border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.exp-anim svg{max-width:100%;height:auto}
.exp-step{margin-top:14px;display:flex;align-items:center;gap:10px;background:var(--aglow);border:1px solid var(--gold2);border-radius:9px;padding:9px 12px;font-size:12.5px;color:var(--ink)}
.exp-step .num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.exp-step .lbl{flex:1;font-weight:600}
.exp-step .nav{display:flex;gap:5px}
.exp-step .nav button{background:#fff;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--ink)}
.exp-step .nav button:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.exp-step .nav button:disabled{opacity:.4;cursor:not-allowed}

.exp-info{display:flex;flex-direction:column;gap:14px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:0 4px 12px -4px rgba(20,33,58,.06)}
.info-card h3{font-family:var(--f-head);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-card h3::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px}
.info-card ul{list-style:none;padding:0;margin:0}
.info-card ul li{font-size:12.5px;color:var(--ink);line-height:1.55;padding:5px 0;display:flex;gap:8px;align-items:flex-start}
.info-card ul li::before{content:'✓';color:var(--green);font-weight:800;flex-shrink:0}
.info-card .steps li::before{content:counter(s);counter-increment:s;color:var(--gold);font-weight:800;background:var(--aglow);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.info-card .steps{counter-reset:s}
.info-card .cta{display:flex;gap:8px;margin-top:14px}
.info-card .cta a{flex:1;text-align:center;background:var(--gold);color:#fff;border-radius:9px;padding:10px;font-size:13px;font-weight:700;text-decoration:none}
.info-card .cta a:hover{background:var(--gold2)}
.info-card .cta a.secondary{background:#fff;color:var(--ink);border:1px solid var(--border)}
.info-card .cta a.secondary:hover{border-color:var(--gold);color:var(--gold)}

/* Animations */
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes slide-in{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes flow{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim-fade{animation:fadeUp .6s ease both}
.anim-pulse{animation:pulse 2s ease-in-out infinite}

@media (max-width:900px){.exp-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-left">
    <a href="home.html" class="tb-brand" style="text-decoration:none;color:inherit">
      <div class="tb-logo">DI</div>
      <div class="tb-name">Digital Infotech <span class="muted">· Platform</span></div>
    </a>
  </div>
  <div class="tb-right">

    <a href="nishi-chatbot.html" class="tb-btn primary">🤖 Back to Nishi</a>
  </div>
</header>

<main class="exp">
  <a href="#" onclick="history.back();return false" class="exp-back">← Back</a>
  <div class="exp-eyebrow" id="eyebrow">FEATURE WALKTHROUGH</div>
  <h1 class="exp-h1" id="title">Loading…</h1>
  <p class="exp-sub" id="subtitle"></p>

  <div class="exp-grid">
    <div class="exp-stage">
      <div class="exp-stage-head">
        <span class="tag">▶ Animated walkthrough</span>
        <div class="ctrl">
          <button id="btn-play">▶ Play</button>
          <button id="btn-restart">↻ Restart</button>
        </div>
      </div>
      <div class="exp-anim" id="anim"></div>
      <div class="exp-step">
        <div class="num" id="step-num">1</div>
        <div class="lbl" id="step-label">Step 1 of 4</div>
        <div class="nav">
          <button id="step-prev" onclick="stepPrev()" disabled>← Prev</button>
          <button id="step-next" onclick="stepNext()">Next →</button>
        </div>
      </div>
    </div>

    <div class="exp-info">
      <div class="info-card">
        <h3>What it does</h3>
        <p id="desc-long" style="font-size:13px;color:var(--ink);line-height:1.6"></p>
      </div>
      <div class="info-card">
        <h3>Benefits</h3>
        <ul id="benefits"></ul>
      </div>
      <div class="info-card">
        <h3>How to use it</h3>
        <ul class="steps" id="how-steps"></ul>
        <div class="cta">
          <a id="cta-open" href="#">Try it now →</a>
          <a class="secondary" href="nishi-chatbot.html">Ask Nishi</a>
        </div>
      </div>
    </div>
  </div>
</main>

/* ── Wiring ── */
function getParam(name){
  const m = new RegExp('[?&]' + name + '=([^&#]*)').exec(location.search);
  return m ? decodeURIComponent(m[1]) : '';
}

const fid = getParam('feature') || 'rfp';
const f = FEATURES[fid] || FEATURES.rfp;

document.getElementById('eyebrow').textContent = (f.title || 'FEATURE').toUpperCase() + ' · WALKTHROUGH';
document.title = f.title + ' · DI Platform';
document.getElementById('title').innerHTML = f.title + ' — <em>' + (f.titleEm || '') + '</em>';
document.getElementById('subtitle').textContent = f.subtitle;
document.getElementById('desc-long').textContent = f.desc;
document.getElementById('benefits').innerHTML = f.benefits.map(b => '<li>' + b + '</li>').join('');
document.getElementById('how-steps').innerHTML = f.steps.map(s => '<li>' + s + '</li>').join('');
document.getElementById('cta-open').href = f.openHref || 'home.html';

let currentStep = 0;
const maxStep = f.steps.length;
function renderAnim(){
  const host = document.getElementById('anim');
  host.innerHTML = (ANIM[f.anim] || ANIM.rfp)();
}
function updateStepUI(){
  document.getElementById('step-num').textContent = (currentStep + 1);
  document.getElementById('step-label').textContent = 'Step ' + (currentStep + 1) + ' of ' + maxStep + ' · ' + f.steps[currentStep];
  document.getElementById('step-prev').disabled = currentStep === 0;
  document.getElementById('step-next').disabled = currentStep === maxStep - 1;
}
function stepPrev(){ if (currentStep > 0) { currentStep--; updateStepUI(); renderAnim(); } }
function stepNext(){ if (currentStep < maxStep - 1) { currentStep++; updateStepUI(); renderAnim(); } }
document.getElementById('btn-restart').onclick = function(){ currentStep = 0; updateStepUI(); renderAnim(); };
document.getElementById('btn-play').onclick = function(){
  // auto-advance every 2.5s
  const total = maxStep - currentStep;
  for (let i = 1; i <= total; i++) {
    setTimeout(stepNext, i * 2500);
  }
};

renderAnim();
updateStepUI();
</script>
