<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ledger · DI Platform</title>
<meta name="description" content="Open accounts, post double-entry journals, and read balances/statements on live agent data."/>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/aidp-enterprise.css">
<script src="assets/top-bar.js" defer></script>
<script src="assets/aidp-api.js"></script>
<script src="assets/ledger-api.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,var(--canvas),var(--canvas-2));color:var(--ink);font-family:var(--f-ui);font-size:13.5px;line-height:1.5;min-height:100vh}
button{font-family:var(--f-ui);cursor:pointer;border:none}
.bk-hero{padding:22px 24px;background:linear-gradient(180deg,#fff,var(--canvas));border-bottom:1px solid var(--border)}
.bk-wrap{max-width:1100px;margin:0 auto}
.bk-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.bk-h1{font-family:var(--f-head);font-size:24px;font-weight:600}.bk-h1 em{font-style:italic;color:var(--gold)}
.bk-sub{color:var(--ink-2);margin-top:4px;font-size:13px}
.bk-main{max-width:1100px;margin:0 auto;padding:22px 24px 40px;display:grid;grid-template-columns:1fr 1.1fr;gap:18px}
@media (max-width:850px){.bk-main{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.card h2{font-family:var(--f-head);font-size:15px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--canvas);color:var(--ink)}
.field textarea{min-height:84px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.row{display:flex;gap:10px}.row>*{flex:1}
.btn{padding:9px 16px;border-radius:8px;font-size:12.5px;font-weight:600;background:var(--canvas);border:1px solid var(--border);color:var(--ink)}
.btn:hover{border-color:var(--gold)}.btn-primary{background:var(--gold);color:#1A2238;border:none}.btn-primary:hover{filter:brightness(1.05)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.muted{color:var(--ink-2)}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.pill.ok{background:var(--green-bg);color:#0A8462}.pill.warn{background:#FFF3E0;color:var(--orange)}.pill.err{background:#FDE7E7;color:var(--red)}
.kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.kv .k{color:var(--ink-2);font-weight:600}.kv .v{text-align:right;word-break:break-word}
pre.raw{background:var(--canvas);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11.5px;overflow:auto;max-height:300px;white-space:pre-wrap}
.note{font-size:11.5px;color:var(--ink-2);margin-top:10px}
.err-box{background:#FDE7E7;border:1px solid var(--red);color:#A21C1C;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-top:10px}
.line{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:6px 0;font-size:12px}
</style>
</head>
<body>
<div data-di-topbar></div>
<div class="bk-hero"><div class="bk-wrap">
  <div class="bk-eyebrow">Core Banking · Ledger</div>
  <div class="bk-h1">General <em>Ledger</em></div>
  <div class="bk-sub">Open accounts, post balanced double-entry journals, and read balances & statements — live, through the gateway.</div>
</div></div>
<div class="bk-main">
  <div>
    <div class="card">
      <h2>Open account</h2>
      <div class="row"><div class="field"><label>Account no</label><input id="a-no" placeholder="e.g. 100200"/></div><div class="field"><label>Name</label><input id="a-name" placeholder="e.g. Customer Deposits"/></div></div>
      <div class="row"><div class="field"><label>Type</label><select id="a-type"><option>asset</option><option>liability</option><option>income</option><option>expense</option><option>equity</option></select></div><div class="field"><label>Currency</label><input id="a-ccy" value="USD"/></div></div>
      <div class="btn-row"><button class="btn btn-primary" id="b-open">Open account →</button></div>
    </div>
    <div class="card">
      <h2>Post a journal</h2>
      <div class="field"><label>Ref</label><input id="j-ref" placeholder="e.g. JNL-0001"/></div>
      <div class="field"><label>Narrative</label><input id="j-narr" placeholder="e.g. Customer deposit"/></div>
      <div class="field"><label>Lines (JSON · must balance)</label><textarea id="j-lines">[
  { "account": "100200", "dr": 1000, "cr": 0 },
  { "account": "200100", "dr": 0, "cr": 1000 }
]</textarea></div>
      <div class="btn-row"><button class="btn btn-primary" id="b-post">Post journal →</button></div>
      <div id="err" class="err-box" style="display:none"></div>
    </div>
  </div>
  <div class="card">
    <h2>Balances &amp; statement</h2>
    <div class="row"><div class="field"><label>Account no</label><input id="q-no" placeholder="e.g. 100200"/></div></div>
    <div class="btn-row"><button class="btn" id="b-balance">Balance</button><button class="btn" id="b-statement">Statement</button></div>
    <div class="result" id="result" style="margin-top:10px"><p class="muted" style="padding:14px 0">Open an account, post a journal, or query a balance to see live results here.</p></div>
    <details style="margin-top:12px"><summary class="muted" style="cursor:pointer;font-size:12px">Raw response</summary><pre class="raw" id="raw">—</pre></details>
  </div>
</div>
<script>
(function () {
  var $=function(id){return document.getElementById(id);};
  function showErr(e){var b=$('err');b.style.display='block';b.textContent=(e&&e.message)||String(e);}
  function clearErr(){$('err').style.display='none';}
  function setRaw(o){$('raw').textContent=JSON.stringify(o,null,2);}
  function kv(k,v){return '<div class="kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';}
  function render(res,ctx){
    setRaw(res);
    var html='';
    if(res.accountNo) html+=kv('Account',res.accountNo);
    if(res.balance!==undefined) html+=kv('Balance',(typeof res.balance==='number'?res.balance.toLocaleString():res.balance)+(res.currency?' '+res.currency:''));
    if(res.dr!==undefined) html+=kv('Total Dr',res.dr);
    if(res.cr!==undefined) html+=kv('Total Cr',res.cr);
    if(res.status||res.posted!==undefined) html+=kv('Status',res.status||(res.posted?'posted':'—'));
    if(res.ref) html+=kv('Ref',res.ref);
    var lines=res.lines||res.entries;
    if(Array.isArray(lines)&&lines.length){html+='<div style="margin-top:10px"><div class="muted" style="font-size:11px;font-weight:700;text-transform:uppercase">Lines ('+lines.length+')</div>';lines.slice(0,15).forEach(function(l){html+='<div class="line"><span>'+(l.account||l.narrative||l.ref||'—')+'</span><span class="muted">Dr '+(l.dr||0)+' · Cr '+(l.cr||0)+'</span></div>';});html+='</div>';}
    $('result').innerHTML=html||'<p class="muted" style="padding:14px 0">Response received — see raw below.</p>';
  }
  async function guard(fn){clearErr();try{var r=await fn();render(r);}catch(e){showErr(e);setRaw({error:String(e&&e.message||e)});}}
  $('b-open').onclick=function(){guard(function(){return LedgerAPI.openAccount({accountNo:$('a-no').value.trim(),name:$('a-name').value.trim(),type:$('a-type').value,currency:$('a-ccy').value.trim()});});};
  $('b-post').onclick=function(){var lines;try{lines=JSON.parse($('j-lines').value);}catch(e){showErr(new Error('Lines must be valid JSON: '+e.message));return;}guard(function(){return LedgerAPI.post($('j-ref').value.trim(),$('j-narr').value.trim(),lines);});};
  $('b-balance').onclick=function(){guard(function(){return LedgerAPI.balance($('q-no').value.trim());});};
  $('b-statement').onclick=function(){guard(function(){return LedgerAPI.statement($('q-no').value.trim(),20);});};
})();
</script>
</body>
</html>
